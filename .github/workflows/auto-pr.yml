name: Auto-create PR for Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if none exists
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            // Check if a PR already exists for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            if (prs.length > 0) {
              console.log(`PR #${prs[0].number} already exists for ${branch}`);
              return;
            }
            // Create a new PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto-deploy: ${branch}`,
              head: branch,
              base: 'master',
              body: `Auto-created PR for branch \`${branch}\`. Will be auto-merged by the auto-merge workflow.`
            });
            console.log(`Created PR #${pr.number} for ${branch}`);
