function toggleDontMissQuiz() {
  if (App.dontMissItems.length === 0) return;
  App.dmQuizMode = !App.dmQuizMode;
  if (App.dmQuizMode) {
    // Shuffle items for quiz
    App.dmQuizItems = App.dontMissItems.slice();
    for (var i = App.dmQuizItems.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = App.dmQuizItems[i]; App.dmQuizItems[i] = App.dmQuizItems[j]; App.dmQuizItems[j] = t; }
    App.dmQuizItems = App.dmQuizItems.slice(0, 30); // cap at 30 per round
    App.dmQuizIndex = 0; App.dmQuizFlipped = false; App.dmQuizKnew = 0; App.dmQuizMissed = 0;
    document.getElementById('dontmiss-quiz-btn').textContent = '📋 List Mode';
    renderDmQuiz();
  } else {
    document.getElementById('dontmiss-quiz-btn').innerHTML = '&#x26A1; Quiz Mode';
    renderDontMiss();
  }
}

function renderDmQuiz() {
  var el = document.getElementById('dontmiss-content');
  var items = App.dmQuizItems;
  if (App.dmQuizIndex >= items.length) { renderDmQuizDone(); return; }
  var item = items[App.dmQuizIndex];
  var pct = ((App.dmQuizIndex / items.length) * 100).toFixed(0);

  var html = '<div class="flashcard-meta">' + (App.dmQuizIndex + 1) + ' / ' + items.length + ' &bull; ' + escapeHtml(item.specialty) + '</div>';
  html += '<div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
  html += '<div class="flashcard-container"><div class="flashcard' + (App.dmQuizFlipped ? ' flipped' : '') + '" onclick="flipDmQuizCard()">';
  if (item.condensed && item.title) {
    html += '<div class="flashcard-front"><div><strong>' + escapeHtml(item.title) + '</strong></div></div>';
    var sections = (item.points || '').split('|').map(function(s) { return s.trim(); }).filter(Boolean);
    html += '<div class="flashcard-back"><div style="text-align:left;font-size:14px;line-height:1.8">';
    for (var si = 0; si < sections.length; si++) html += '<div>' + escapeHtml(sections[si]) + '</div>';
    html += '</div></div>';
  } else {
    html += '<div class="flashcard-front"><div>' + escapeHtml(item.specialty) + '</div></div>';
    html += '<div class="flashcard-back"><div>' + escapeHtml(item.item) + '</div></div>';
  }
  html += '</div></div>';

  if (App.dmQuizFlipped) {
    html += '<div class="flashcard-nav">';
    html += '<button class="btn btn-error" onclick="rateDmQuiz(false)" style="flex:1;padding:14px;font-size:15px">&#x2717; Didn\'t Know</button>';
    html += '<button class="btn btn-success" onclick="rateDmQuiz(true)" style="flex:1;padding:14px;font-size:15px">&#x2713; Knew It</button>';
    html += '</div>';
    html += '<div style="text-align:center;margin-top:8px;color:var(--text-light);font-size:12px">Keyboard: 1 = Didn\'t Know &bull; 2 = Knew It</div>';
  } else {
    html += '<div class="flashcard-nav">';
    html += '<button class="btn btn-accent" onclick="flipDmQuizCard()" style="flex:1;padding:14px;font-size:15px">Tap to Flip</button>';
    html += '</div>';
    html += '<div style="text-align:center;margin-top:8px;color:var(--text-light);font-size:12px">Keyboard: Space to flip</div>';
  }
  el.innerHTML = html;
}

function flipDmQuizCard() {
  App.dmQuizFlipped = !App.dmQuizFlipped;
  renderDmQuiz();
}

function rateDmQuiz(knew) {
  if (knew) App.dmQuizKnew++; else App.dmQuizMissed++;
  App.dmQuizIndex++;
  App.dmQuizFlipped = false;
  renderDmQuiz();
}

function renderDmQuizDone() {
  var el = document.getElementById('dontmiss-content');
  var total = App.dmQuizItems.length;
  var pct = total > 0 ? Math.round((App.dmQuizKnew / total) * 100) : 0;
  var html = '<div class="card" style="text-align:center;padding:40px">';
  html += '<h3>Don\'t Miss Quiz Complete!</h3>';
  html += '<div class="daily-card-score-ring"><div class="daily-card-score-number">' + App.dmQuizKnew + '/' + total + '</div><div class="daily-card-score-label">' + pct + '% Knew</div></div>';
  html += '<p style="margin:16px 0;color:var(--text-light)">' + App.dmQuizMissed + ' items to review</p>';
  html += '<button class="btn btn-primary" onclick="toggleDontMissQuiz(); toggleDontMissQuiz();" style="margin:8px">Play Again</button>';
  html += '<button class="btn" onclick="App.dmQuizMode=false; document.getElementById(\'dontmiss-quiz-btn\').innerHTML=\'&#x26A1; Quiz Mode\'; renderDontMiss();">Back to List</button>';
  html += '</div>';
  el.innerHTML = html;
}

var searchTimeout;
function handleSearch(query) {
  clearTimeout(searchTimeout);
  if (query.length < 2) { document.getElementById('search-results').innerHTML = '<p class="empty-state">Type at least 2 characters to search.</p>'; return; }
  searchTimeout = setTimeout(function() {
    document.getElementById('search-results').innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
    serverCall('searchAll', query).then(function(results) { renderSearchResults(results, query); })
      .catch(function(e) { document.getElementById('search-results').innerHTML = '<div class="card"><p>Error: ' + escapeHtml(e.message || String(e)) + '</p></div>'; });
  }, 400);
}

function renderSearchResults(results, query) {
  var el = document.getElementById('search-results');
  var total = results.flashcards.length + results.notes.length + results.mcq.length + results.dontmiss.length;
  if (total === 0) { el.innerHTML = '<p class="empty-state">No results for "' + escapeHtml(query) + '"</p>'; return; }

  var html = '<p style="color:var(--text-light);margin-bottom:16px">' + total + ' results</p>';
  if (results.flashcards.length > 0) {
    html += '<div class="search-group"><h3>Flashcards (' + results.flashcards.length + ')</h3>';
    results.flashcards.forEach(function(f) { html += '<div class="search-item"><strong>' + escapeHtml(f.front) + '</strong><br><span style="color:var(--text-light)">' + escapeHtml(truncate(f.back, 200)) + '</span></div>'; });
    html += '</div>';
  }
  if (results.notes.length > 0) {
    html += '<div class="search-group"><h3>Bullet Notes (' + results.notes.length + ')</h3>';
    results.notes.forEach(function(n) { html += '<div class="search-item"><span style="color:var(--primary);font-size:12px">' + escapeHtml(n.specialty) + '</span><br>' + escapeHtml(n.note) + '</div>'; });
    html += '</div>';
  }
  if (results.mcq.length > 0) {
    html += '<div class="search-group"><h3>Questions (' + results.mcq.length + ')</h3>';
    results.mcq.forEach(function(q) { html += '<div class="search-item"><span style="color:var(--primary);font-size:12px">' + escapeHtml(q.specialty) + '</span><br>' + escapeHtml(truncate(q.question, 200)) + '</div>'; });
    html += '</div>';
  }
  if (results.dontmiss.length > 0) {
    html += '<div class="search-group"><h3>Don\'t Miss (' + results.dontmiss.length + ')</h3>';
    results.dontmiss.forEach(function(d) { html += '<div class="dontmiss-item">' + escapeHtml(d.item) + '</div>'; });

  }
  el.innerHTML = html;
}

function sendDrDataMessage() {
  var input = document.getElementById('drdata-input'); var message = input.value.trim(); if (!message) return;
  input.value = ''; App.drDataHistory.push({ role: 'user', content: message }); renderDrDataChat();
  var msgs = document.getElementById('drdata-messages');
  msgs.innerHTML += '<div class="chat-message assistant typing" id="dd-typing">Dr. Data is thinking...</div>';
  msgs.scrollTop = msgs.scrollHeight; input.disabled = true;

  serverCall('askDrData', message, App.drDataHistory.slice(-20)).then(function(result) {
    removeEl('dd-typing'); App.drDataHistory.push({ role: 'assistant', content: result.response }); renderDrDataChat(); input.disabled = false; input.focus();
  }).catch(function(e) {
    removeEl('dd-typing'); App.drDataHistory.push({ role: 'assistant', content: 'Error: ' + (e.message || String(e)) }); renderDrDataChat(); input.disabled = false;
  });
}

function clearDrDataChat() { App.drDataHistory = []; renderDrDataChat(); }

function renderDrDataChat() {
  var el = document.getElementById('drdata-messages');

}

  document.body.appendChild(overlay);
}

function extractPatientJSON(text) {
  var patterns = [/`{1,3}\s*patient\s*\n?([\s\S]*?)\n?\s*`{1,3}/i, /`{1,3}\s*\n?(\{[^`]*"name"[^`]*"diagnosis"[^`]*\})\n?\s*`{1,3}/i, /(\{\s*"name"\s*:[\s\S]*?"diagnosis"\s*:[^}]*\})/];
  for (var i = 0; i < patterns.length; i++) { var m = text.match(patterns[i]); if (m) { var s = m[1].trim(); if (s.charAt(0) === '{') return s; } }
  return null;
}

function stripPatientJSON(text) {
  text = text.replace(/`{1,3}\s*patient\s*\n?[\s\S]*?\n?\s*`{1,3}\s*/gi, '');
  text = text.replace(/`{1,3}\s*\n?\{[^`]*"name"[^`]*"diagnosis"[^`]*\}\n?\s*`{1,3}\s*/gi, '');
  text = text.replace(/\{\s*"name"\s*:[\s\S]*?"diagnosis"\s*:[^}]*\}\s*/g, '');
  return text.trim();
}

function startNextPBCase() {
  App.pbCurrentCase++;
  var el = document.getElementById('patientbot-content');
  el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><p style="margin-top:16px;color:var(--text-light)">Generating case ' + App.pbCurrentCase + ' of ' + App.pbTotalCases + '...</p></div>';

  serverCall('startPatientBotCase', App.pbSetupSpecialty, App.pbCheatMode, App.pbDifficulty, App.pbCustom || {}).then(function(result) {
    App.pbCaseId = result.caseId; App.pbSpecialty = result.specialty; App.pbPresentation = result.presentation || '';
    App.pbDiagnosis = null; App.pbPatientInfo = null; App.pbDiagnosing = false; App.pbDiagAttempts = 0; App.pbDiagResolved = false;
    App.pbPartialUsed = false; App.pbPartialFeedback = null; App.pbPartialScore = null; App.pbScorecard = null;

    var msg = stripPatientJSON(result.initialMessage);
    if (result.patientInfo) { App.pbPatientInfo = result.patientInfo; App.pbDiagnosis = result.patientInfo.diagnosis; }
    else { var jsonStr = extractPatientJSON(result.initialMessage); if (jsonStr) { try { App.pbPatientInfo = JSON.parse(jsonStr); App.pbDiagnosis = App.pbPatientInfo.diagnosis; } catch(e) {} } }

    App.pbHistory = [{ role: 'assistant', content: msg }];
    renderPBChat();
  }).catch(function(e) {
    el.innerHTML = '<div class="card"><p>Error: ' + escapeHtml(e.message || String(e)) + '</p><button class="btn btn-primary" onclick="startNextPBCase()" style="margin-top:12px">Try Again</button></div>';
  });
}

function sendPBMessage() {
  var input = document.getElementById('pb-input'); var message = input.value.trim(); if (!message) return;

  // Intercept "answernow" — trigger debrief instead of sending to patient
  if (message.toLowerCase().replace(/\s/g, '') === 'answernow') {
    input.value = '';
    triggerPBDebrief();
    return;
  }

  input.value = ''; App.pbHistory.push({ role: 'user', content: message });

  var target = App.dailyPhase === 'pb' ? renderDailyPBChat : renderPBChat;
  target();

  var msgs = document.getElementById('pb-messages');
  msgs.innerHTML += '<div class="chat-message assistant typing" id="pb-typing">Patient is responding...</div>';
  msgs.scrollTop = msgs.scrollHeight; input.disabled = true;

  serverCall('sendPatientBotMessage', App.pbCaseId, message, App.pbHistory.slice(-30)).then(function(result) {
    removeEl('pb-typing');
    if (result.expired) { App.pbCaseId = null; showPatientBotSetup(); return; }

    // PATIENT DIED
    if (result.fatal) {
      if (result.consequence) App.pbHistory.push({ role: 'system', content: result.consequence });
      App.pbVitals = result.vitals;
      App.pbDiagResolved = true;
      App.pbCaseScores.push({ specialty: App.pbSpecialty, caseNum: App.pbCurrentCase, correct: false, diagnosis: App.pbDiagnosis, fatal: true, causeOfDeath: result.causeOfDeath, points: 0 });
      serverCall('saveProgress', 'pb_result', { correct: false, specialty: App.pbSpecialty, diagnosis: App.pbDiagnosis, fatal: true, causeOfDeath: result.causeOfDeath, points: 0 });
      App.pbHistory.push({ role: 'death', content: result.causeOfDeath || 'The patient has died.' });
      target(); return;
    }

    // Show consequence as system message if present
    if (result.consequence) {
      App.pbHistory.push({ role: 'system', content: result.consequence });
    }
    // Show test results as a results message
    if (result.testResults) {
      App.pbHistory.push({ role: 'results', content: result.testResults });
    }
    // Update vitals display
    if (result.vitals) App.pbVitals = result.vitals;
    App.pbHistory.push({ role: 'assistant', content: result.response });
    target(); input.disabled = false; input.focus();
  }).catch(function(e) {
    removeEl('pb-typing'); App.pbHistory.push({ role: 'assistant', content: 'Error: ' + (e.message || String(e)) });
    target(); input.disabled = false;
  });
}

function triggerPBDebrief() {
  var target = App.dailyPhase === 'pb' ? renderDailyPBChat : renderPBChat;
  var msgs = document.getElementById('pb-messages');
  msgs.innerHTML += '<div class="chat-message assistant typing" id="pb-typing">Generating debrief...</div>';
  msgs.scrollTop = msgs.scrollHeight;
  var input = document.getElementById('pb-input');
  if (input) input.disabled = true;

  serverCall('debriefPatientBot', App.pbCaseId, App.pbHistory.slice(-40)).then(function(result) {
    removeEl('pb-typing');
    if (input) input.disabled = false;
    App.pbDiagResolved = true;
    App.pbCaseScores.push({ specialty: App.pbSpecialty, caseNum: App.pbCurrentCase, correct: false, diagnosis: App.pbDiagnosis, skipped: true, points: 0 });
    App.pbHistory.push({ role: 'debrief', content: result });
    target();
  }).catch(function(e) {
    removeEl('pb-typing');
    if (input) input.disabled = false;
    App.pbHistory.push({ role: 'system', content: 'Debrief error: ' + (e.message || String(e)) });
    target();
  });
}

function quickNewPBCase() {
  App.pbCurrentCase = 0; App.pbCaseScores = []; App.pbTotalCases = 1;
  App.pbVitals = null;
  startNextPBCase();
}

function togglePBTips() {
  var panel = document.getElementById('pb-actions-panel');
  if (panel) panel.style.display = panel.style.display === 'none' ? '' : 'none';
}

function togglePBCategory(catIndex, btn) {
  var panel = document.getElementById('pb-actions-panel');
  var catPanel = document.getElementById('pb-cat-' + catIndex);
  if (!panel || !catPanel) return;

  // Check if this category is already open
  var isOpen = catPanel.style.display !== 'none';

  // Hide all categories
  var allPanels = panel.querySelectorAll('.pb-cat-panel');
  for (var i = 0; i < allPanels.length; i++) allPanels[i].style.display = 'none';

  // Deactivate all tabs
  var allTabs = document.querySelectorAll('.pb-action-tab');
  for (var i = 0; i < allTabs.length; i++) allTabs[i].classList.remove('active');

  if (isOpen) {
    // Close panel
    panel.style.display = 'none';
  } else {
    // Open this category
    panel.style.display = '';
    catPanel.style.display = '';
    btn.classList.add('active');
  }
}

function insertPBAction(text) {
  // Ensure text has asterisks for actions
  if (text.indexOf('*') === -1) text = '*' + text + '*';
  // Close panel
  var panel = document.getElementById('pb-actions-panel');
  if (panel) panel.style.display = 'none';
  var allTabs = document.querySelectorAll('.pb-action-tab');
  for (var i = 0; i < allTabs.length; i++) allTabs[i].classList.remove('active');
  // Auto-send
  var input = document.getElementById('pb-input');
  if (input) { input.value = text; }
  sendPBMessage();
}

function showDiagnoseModal() { App.pbDiagnosing = true; var fn = App.dailyPhase === 'pb' ? renderDailyPBChat : renderPBChat; fn(); }
function closeDiagnoseModal() { App.pbDiagnosing = false; var fn = App.dailyPhase === 'pb' ? renderDailyPBChat : renderPBChat; fn(); }

function submitPBDiagnosis() {
  var input = document.getElementById('pb-diag-input'); var answer = input ? input.value.trim() : ''; if (!answer) return;
  var btn = document.getElementById('pb-diag-submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Checking...'; }
  App.pbDiagAttempts++;

  serverCall('submitDiagnosis', App.pbCaseId, answer, App.pbDiagnosis, App.pbHistory.slice(-20)).then(function(result) {
    App.pbDiagnosing = false;
    var renderFn = App.dailyPhase === 'pb' ? renderDailyPBChat : renderPBChat;

    if (result.expired) { App.pbCaseId = null; showPatientBotSetup(); return; }

    if (result.score >= 40 && result.score < 80 && !App.pbPartialUsed) {
      // Partial credit — let them keep investigating and try once more
      App.pbPartialUsed = true;
      App.pbHistory.push({ role: 'partial', content: { score: result.score, feedback: result.feedback } });
      renderFn();
      return;
    }

    App.pbDiagResolved = true;
    if (result.correct) {
      var pts = POINTS.PB_CORRECT + (App.pbDiagAttempts === 1 ? POINTS.PB_FIRST_TRY : 0);
      App.pbHistory.push({ role: 'diagnosis_result', content: { correct: true, score: result.score, feedback: result.feedback, points: pts, answer: App.pbDiagnosis } });
      App.pbCaseScores.push({ specialty: App.pbSpecialty, caseNum: App.pbCurrentCase, correct: true, diagnosis: App.pbDiagnosis, attempts: App.pbDiagAttempts, feedback: result.feedback, points: pts, score: result.score });
      serverCall('saveProgress', 'pb_result', { correct: true, specialty: App.pbSpecialty, diagnosis: App.pbDiagnosis, attempts: App.pbDiagAttempts, points: pts, feedback: result.feedback, score: result.score, transcript: getPBTranscript() });
    } else {
      App.pbHistory.push({ role: 'diagnosis_result', content: { correct: false, score: result.score, feedback: result.feedback, points: 0, answer: App.pbDiagnosis } });
      App.pbCaseScores.push({ specialty: App.pbSpecialty, caseNum: App.pbCurrentCase, correct: false, diagnosis: App.pbDiagnosis, attempts: App.pbDiagAttempts, feedback: result.feedback, points: 0, score: result.score });
      serverCall('saveProgress', 'pb_result', { correct: false, specialty: App.pbSpecialty, diagnosis: App.pbDiagnosis, attempts: App.pbDiagAttempts, points: 0, feedback: result.feedback, score: result.score, transcript: getPBTranscript() });
    }
    renderFn();
  }).catch(function(e) {
    App.pbDiagnosing = false; App.pbHistory.push({ role: 'assistant', content: 'Error: ' + (e.message || String(e)) });
    var fn = App.dailyPhase === 'pb' ? renderDailyPBChat : renderPBChat; fn();
  });
}

function finishCurrentPBCase() {
  if (!App.pbDiagResolved) {
    App.pbCaseScores.push({ specialty: App.pbSpecialty, caseNum: App.pbCurrentCase, correct: false, diagnosis: App.pbDiagnosis, attempts: 0, skipped: true, points: 0 });
  }
  if (App.dailyPhase === 'pb') { finishDailyPBCase(); return; }
  if (App.pbCurrentCase >= App.pbTotalCases) { showPBSummary(); } else { App.pbCaseId = null; App.pbHistory = []; startNextPBCase(); }
}

function showPBSummary() {
  var el = document.getElementById('patientbot-content');
  var scores = App.pbCaseScores;
  var correct = scores.filter(function(s) { return s.correct; }).length;
  var total = scores.length;
  var pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  var totalPts = 0; scores.forEach(function(s) { totalPts += (s.points || 0); });

  var html = '<div class="card" style="text-align:center;padding:40px">';
  html += '<h2>Session Complete!</h2>';
  html += '<div class="daily-card-score-ring" style="margin:20px auto"><div class="daily-card-score-number">' + correct + '/' + total + '</div><div class="daily-card-score-label">' + pct + '% Correct</div></div>';
  html += '<p style="color:var(--accent);font-weight:700">+' + totalPts + ' XP</p>';
  html += '</div>';

  html += '<div class="card"><h3 class="section-title">Case Results</h3>';
  for (var i = 0; i < scores.length; i++) {
    var c = scores[i];
    var icon = c.correct ? '<span style="color:var(--success)">&#x2705;</span>' : (c.skipped ? '<span style="color:var(--text-light)">&#x23ED;</span>' : '<span style="color:var(--error)">&#x274C;</span>');
    html += '<div class="weak-area-row"><span>' + icon + ' Case ' + c.caseNum + ' &mdash; ' + escapeHtml(c.specialty) + '</span>';
    html += '<span style="font-size:13px;color:var(--text-light)">' + (c.skipped ? 'Skipped' : escapeHtml(c.diagnosis || '?') + ' (' + c.attempts + ' try)') + '</span></div>';
  }
  html += '</div>';

  html += '<div style="display:flex;gap:12px;margin-top:20px">';
  html += '<button class="btn btn-primary" onclick="showPatientBotSetup()">New Session</button>';
  html += '<button class="btn btn-accent" onclick="navigateTo(\'dashboard\')">Dashboard</button>';
  html += '</div>';
  el.innerHTML = html;
}

function getPBTranscript() {
  // Save compact transcript for case library (max 20 messages, truncated)
  return App.pbHistory.slice(0, 20).map(function(m) {
    return { role: m.role, content: (m.content || '').substring(0, 400) };
  });
}

  App.pbScorecardLoading = true;

function endPBCase() { App.pbCaseId = null; App.pbHistory = []; App.pbSpecialty = null; App.pbPartialUsed = false; App.pbPartialFeedback = null; App.pbPartialScore = null; App.pbScorecard = null; App.pbScorecardLoading = false; showPatientBotSetup(); }

function renderPBChat() {
  var el = document.getElementById('patientbot-content');

}

function renderPBChatInner() {
  var caseLabel = App.pbTotalCases > 1 ? ' (Case ' + App.pbCurrentCase + '/' + App.pbTotalCases + ')' : '';
  var p = App.pbPatientInfo;

  var html = '<div class="pb-top-bar"><div class="pb-top-left"><h3>PatientBot &mdash; ' + escapeHtml(App.pbSpecialty) + caseLabel + '</h3></div>';
  html += '<div class="pb-top-right">';
  if (App.pbDiagResolved) {
    if (App.dailyPhase === 'pb') {
      html += '<button class="btn btn-sm btn-success" onclick="finishCurrentPBCase()">Next</button>';

      html += '<button class="btn btn-sm btn-success" onclick="finishCurrentPBCase()">Next Case</button>';
    }
  }
  html += '<button class="btn btn-sm btn-outline" onclick="' + (App.dailyPhase === 'pb' ? 'finishCurrentPBCase()' : 'endPBCase()') + '">End</button>';
  html += '</div></div>';

  // Patient info bar (sticky) — uses live vitals if available
  if (p) {
    var v = App.pbVitals || p; // live vitals from consequence engine, or initial
    html += '<div class="pb-patient-bar">';
    html += '<span class="pb-info-chip"><strong>' + escapeHtml(p.name || '?') + '</strong></span>';
    html += '<span class="pb-info-chip">' + (p.age || '?') + (p.sex === 'NB' ? 'NB' : (p.sex === 'F' ? 'F' : 'M')) + '</span>';
    var hrColor = (v.hr > 120 || v.hr < 50) ? 'color:var(--error);font-weight:700' : '';
    var spo2Color = (v.spo2 < 92) ? 'color:var(--error);font-weight:700' : '';
    var rrColor = (v.rr > 24 || v.rr < 8) ? 'color:var(--error);font-weight:700' : '';
    html += '<span class="pb-info-chip" style="' + hrColor + '">HR ' + (v.hr || '?') + '</span>';
    html += '<span class="pb-info-chip">BP ' + (v.bp || '?') + '</span>';
    html += '<span class="pb-info-chip" style="' + rrColor + '">RR ' + (v.rr || '?') + '</span>';
    html += '<span class="pb-info-chip">T ' + (v.temp || '?') + '&deg;C</span>';
    html += '<span class="pb-info-chip" style="' + spo2Color + '">SpO2 ' + (v.spo2 || '?') + '%</span>';
    html += '</div>';
  }

    html += '<div class="pb-cheat-banner"><strong>Cheat Mode</strong> &mdash; Diagnosis: ' + escapeHtml(App.pbDiagnosis || '?') + '</div>';
  }

  // Partial feedback now shown inline in chat history

  // Diagnosis results now shown inline in chat history

      html += '<div style="margin-bottom:12px"><strong>Score:</strong> ' + (db.score || '?') + '/10</div>';
      html += '<div style="font-size:15px;line-height:1.7;white-space:pre-wrap">' + escapeHtml(db.feedback || '') + '</div>';

    } else if (m.role === 'results') {

      html += '</div>';

      var pc = m.content;
      html += '<div style="background:rgba(255,193,7,0.12);border:2px solid #f9a825;color:var(--text);padding:16px 20px;margin:12px 0;border-radius:12px;font-size:14px;line-height:1.6">';

      if (sc.missed && sc.missed.length > 0) {

        html += '<h4 style="margin:0 0 8px;font-size:15px;color:#c62828">Missed Items</h4>';

      html += '</div>';

  }
  html += '</div>';

  if (App.pbDiagnosing) {

    html += '<button class="btn" onclick="closeDiagnoseModal()">Cancel</button>';

  return html;
}

function formatPBInput(text) {
  var html = escapeHtml(text);
  // Format actions in asterisks as italic
  html = html.replace(/\*(.*?)\*/g, '<em style="opacity:0.85">*$1*</em>');
  return html;
}

// =============================================
// UTILITIES
// =============================================

// =============================================
// MEDICAL GLOSSARY / TOOLTIPS
// =============================================

function setLanguage(lang) {
  App.glossaryLang = lang;
  localStorage.setItem('mcc_lang', lang);
  // Reload glossary if we have one and switching languages
  if (lang && !App.glossary) {
    loadGlossary();
  }
}

function loadGlossary() {
  serverCall('getGlossary').then(function(data) {
    if (!data || data.length === 0) return;
    App.glossary = {};
    for (var i = 0; i < data.length; i++) {
      var term = data[i].Term || data[i].term;
      if (term) App.glossary[term.toLowerCase()] = data[i];
    }
    // Build regex from terms (longest first to match multi-word terms first)
    var terms = Object.keys(App.glossary).sort(function(a, b) { return b.length - a.length; });
    var escaped = terms.map(function(t) { return t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); });
    App.glossaryRegex = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'gi');
  }).catch(function() {});
}

function highlightMedTerms(html) {
  if (!App.glossary || !App.glossaryRegex || !App.glossaryLang) return html;
  return html.replace(App.glossaryRegex, function(match) {
    var entry = App.glossary[match.toLowerCase()];
    if (!entry) return match;
    return '<span class="med-term" data-term="' + match.toLowerCase() + '" onmouseenter="showMedTooltip(event)" onmouseleave="hideMedTooltip()" onclick="showMedTooltip(event)">' + match + '</span>';
  });
}

var _tooltipTimeout = null;
function showMedTooltip(e) {
  clearTimeout(_tooltipTimeout);
  hideMedTooltip();
  var termKey = e.target.getAttribute('data-term');
  if (!termKey || !App.glossary[termKey]) return;
  var entry = App.glossary[termKey];
  var lang = App.glossaryLang;
  var rtlLangs = ['fa', 'ar', 'ur'];
  var isRTL = rtlLangs.indexOf(lang) !== -1;

  var tooltip = document.createElement('div');
  tooltip.className = 'med-tooltip';
  tooltip.id = 'med-tooltip-active';

  var catLabel = entry.Category || entry.category || '';
  var def = entry.Definition || entry.definition || '';
  var translation = entry[lang] || entry.translation || entry.fa || '';

  var inner = '<div class="med-tooltip-term">' + escapeHtml(entry.Term || entry.term || termKey);
  if (catLabel) inner += '<span class="med-tooltip-cat">' + escapeHtml(catLabel) + '</span>';
  inner += '</div>';
  if (def) inner += '<div class="med-tooltip-def">' + escapeHtml(def) + '</div>';
  if (translation) inner += '<div class="med-tooltip-translation' + (isRTL ? '' : ' ltr') + '">' + escapeHtml(translation) + '</div>';
  tooltip.innerHTML = inner;

  document.body.appendChild(tooltip);

  // Position near the term
  var rect = e.target.getBoundingClientRect();
  var ttRect = tooltip.getBoundingClientRect();
  var top = rect.bottom + 8;
  var left = rect.left;

  // Keep on screen
  if (top + ttRect.height > window.innerHeight) top = rect.top - ttRect.height - 8;
  if (left + ttRect.width > window.innerWidth) left = window.innerWidth - ttRect.width - 12;
  if (left < 12) left = 12;

  tooltip.style.top = top + 'px';
  tooltip.style.left = left + 'px';
}

function hideMedTooltip() {
  _tooltipTimeout = setTimeout(function() {
    var tt = document.getElementById('med-tooltip-active');
    if (tt) tt.remove();
  }, 200);
}

// LIBRARY (ebook viewer)
// =============================================

var LIBRARY_BOOKS = {
  'toronto-notes': {
    title: 'Toronto Notes 2025',
    driveId: null, // Set after upload — or use getLibraryBooks server call
    icon: '&#x1F4D6;'
  }
};

function openBook(bookKey) {
  // Try to get the book's Drive file ID from server
  serverCall('getLibraryBook', bookKey).then(function(result) {
    if (!result || !result.id) {
      alert('This book hasn\'t been uploaded yet. Upload the PDF to your Google Drive and add it via Dev Panel.');
      return;
    }
    document.getElementById('library-content').style.display = 'none';
    document.getElementById('library-reader').style.display = '';
    document.getElementById('library-book-title').textContent = result.title || bookKey;
    document.getElementById('library-download-btn').href = 'https://drive.google.com/file/d/' + result.id + '/view';
    document.getElementById('library-iframe').src = 'https://drive.google.com/file/d/' + result.id + '/preview';
  }).catch(function(e) {
    alert('Error loading book: ' + (e.message || e));
  });
}

function closeBook() {
  document.getElementById('library-content').style.display = '';
  document.getElementById('library-reader').style.display = 'none';
  document.getElementById('library-iframe').src = '';
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Escape + highlight medical terms (use instead of escapeHtml for study content)
function medHtml(text) {
  return highlightMedTerms(escapeHtml(text));
}

function formatMarkdown(text) {
  if (!text) return '';
  var html = escapeHtml(text);
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
  html = html.replace(/`(.*?)`/g, '<code style="background:#e8e8e8;padding:1px 4px;border-radius:3px;font-size:13px">$1</code>');
  html = html.replace(/^### (.*$)/gm, '<strong style="font-size:15px;display:block;margin:12px 0 4px">$1</strong>');
  html = html.replace(/^## (.*$)/gm, '<strong style="font-size:16px;display:block;margin:14px 0 6px">$1</strong>');
  html = html.replace(/^[•\-] (.*)$/gm, '<span style="display:block;padding-left:16px">&#8226; $1</span>');
  html = html.replace(/^(\d+)\. (.*)$/gm, '<span style="display:block;padding-left:16px">$1. $2</span>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function truncate(str, max) { return !str ? '' : str.length > max ? str.substring(0, max) + '...' : str; }
function removeEl(id) { var el = document.getElementById(id); if (el) el.remove(); }

// =============================================
// KEYBOARD SHORTCUTS
// =============================================

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  if (App.currentPage === 'flashcards' && App.flashcardIndex < (App.flashcards || []).length) {
    if (e.key === ' ') { e.preventDefault(); flipFlashcard(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevFlashcard(); }
    if (App.flashcardFlipped) {
      if (e.key === '1') { e.preventDefault(); rateFlashcard(false); }
      if (e.key === '2') { e.preventDefault(); rateFlashcard(true); }
    }
  }

  if (App.currentPage === 'dontmiss' && App.dmQuizMode && App.dmQuizIndex < (App.dmQuizItems || []).length) {
    if (e.key === ' ') { e.preventDefault(); if (!App.dmQuizFlipped) flipDmQuizCard(); }
    if (App.dmQuizFlipped) {
      if (e.key === '1') { e.preventDefault(); rateDmQuiz(false); }
      if (e.key === '2') { e.preventDefault(); rateDmQuiz(true); }
    }
  }

  if (App.currentPage === 'daily' && App.dailyPhase === 'cards') {
    if (e.key === ' ') { e.preventDefault(); flipDailyCard(); }
    if (App.dailyCardFlipped) {
      if (e.key === '1') { e.preventDefault(); rateDailyCard('missed'); }
      if (e.key === '2') { e.preventDefault(); rateDailyCard('shaky'); }
      if (e.key === '3') { e.preventDefault(); rateDailyCard('knew'); }
    }
  }

  if (App.currentPage === 'daily' && App.dailyPhase === 'quiz') {
    if (e.key >= '1' && e.key <= '5') {
      var opts = ['A', 'B', 'C', 'D', 'E'];
      var idx = parseInt(e.key) - 1;
      if (idx < opts.length) selectDailyQuizAnswer(opts[idx]);
    }
    if (e.key === 'ArrowRight') { e.preventDefault(); if (App.dailyQuizIndex < App.dailyData.mcqs.length - 1) { App.dailyQuizIndex++; renderDailyQuiz(); } }
    if (e.key === 'ArrowLeft') { e.preventDefault(); if (App.dailyQuizIndex > 0) { App.dailyQuizIndex--; renderDailyQuiz(); } }
  }

  if (App.currentPage === 'quiz' && App.quizActive) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevQuizQuestion(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); nextQuizQuestion(); }
    if (e.key >= '1' && e.key <= '5') {
      var opts = ['A', 'B', 'C', 'D', 'E'];
      var idx = parseInt(e.key) - 1;
      if (idx < opts.length) selectQuizAnswer(opts[idx]);
    }
  }
});

// INIT ON LOAD
// =============================================

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
