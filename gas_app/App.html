// =============================================

function navigateTo(page) {
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');

  var links = document.querySelectorAll('.nav-links li');
  for (var i = 0; i < links.length; i++) links[i].classList.remove('active');

  var target = document.getElementById('page-' + page);
  if (target) target.classList.add('active');

  var link = document.querySelector('.nav-links [data-page="' + page + '"]');
  if (link) link.classList.add('active');

  App.currentPage = page;
  document.getElementById('sidebar').classList.remove('open');

  // Update bottom nav active state
  var bottomBtns = document.querySelectorAll('#bottom-nav button');
  for (var i = 0; i < bottomBtns.length; i++) {
    bottomBtns[i].classList.toggle('active', bottomBtns[i].getAttribute('data-page') === page);
  }

  // Add back button to non-dashboard pages (mobile-friendly navigation)
  var headers = document.querySelectorAll('.page-header');
  for (var h = 0; h < headers.length; h++) {
    var existing = headers[h].querySelector('.back-btn');
    if (existing) existing.remove();
  }
  if (page !== 'dashboard') {
    var activeHeader = document.querySelector('#page-' + page + ' .page-header');
    if (activeHeader) {
      var backBtn = document.createElement('button');
      backBtn.className = 'btn btn-sm btn-outline back-btn';
      backBtn.innerHTML = '&larr; Back';
      backBtn.onclick = function() { navigateTo('dashboard'); };
      backBtn.style.cssText = 'margin-right:12px;padding:6px 14px;font-size:14px;vertical-align:middle';
      activeHeader.insertBefore(backBtn, activeHeader.firstChild);
    }
  }

  switch (page) {
    case 'dashboard': loadDashboard(); break;
    case 'daily': loadDailyChallenge(); break;
    case 'flashcards': if (App.flashcards.length === 0) loadFlashcards('All'); break;
    case 'notes': if (App.bulletNotes.length === 0) loadBulletNotes('All'); break;
    case 'quiz':
      if (!App.quizActive) {
        var savedQuiz = restoreQuizState_();
        if (savedQuiz) {
          App.quizQuestions = savedQuiz.questions;
          App.quizAnswers = savedQuiz.answers;
          App.quizCurrentIndex = savedQuiz.index;
          App.quizSetupSpecialty = savedQuiz.specialty;
          App.quizSetupVersion = savedQuiz.version;
          App.quizActive = true;
          renderQuizQuestion();
        } else {
          showQuizSetup();
        }
      }
      break;
    case 'dontmiss': if (App.dontMissItems.length === 0) loadDontMiss('All'); break;
    case 'search': document.getElementById('search-input').focus(); break;
    case 'patientbot': if (!App.pbCaseId) showPatientBotSetup(); break;
    case 'diagrams': if (!App.diagramChapters) loadDiagramChapters(); break;
    case 'leaderboard': loadLeaderboard(); break;
    case 'achievements': loadAchievements(); break;
    case 'devpanel': loadDevPanel(); break;
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function toggleDarkMode() {
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('mcc_theme', 'light');
    document.getElementById('dark-mode-btn').innerHTML = '&#x1F319; Dark Mode';
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('mcc_theme', 'dark');
    document.getElementById('dark-mode-btn').innerHTML = '&#x2600; Light Mode';
  }
}

// Apply saved theme on load
(function() {
  var saved = localStorage.getItem('mcc_theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    // Update button text after DOM ready
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('dark-mode-btn');
      if (btn) btn.innerHTML = '&#x2600; Light Mode';
    });
  }
})();

// =============================================
// SERVER CALL WRAPPER
// =============================================

function serverCall(funcName) {
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject);
    runner[funcName].apply(runner, args);
  });
}

function getGuestId() {
  var profile = localStorage.getItem('mcc_profile');
  if (profile) return 'profile_' + profile;
  var id = localStorage.getItem('mcc_guest_id');
  if (!id) { id = 'g' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); localStorage.setItem('mcc_guest_id', id); }
  return id;
}

  var html = '<div style="max-width:400px;margin:0 auto;padding:60px 20px;text-align:center">';
  html += '<h1 style="font-size:28px;font-weight:900;color:var(--primary);margin-bottom:8px">MCC Master</h1>';

  if (lastName) {

    html += '<p style="color:var(--text-light);margin-bottom:32px;font-size:17px">Welcome back!</p>';
    html += '<div style="font-size:24px;font-weight:800;color:var(--text);margin-bottom:32px">Hello ' + escapeHtml(displayName) + '</div>';
    if (isGuest) {
      html += '<button class="btn btn-primary" onclick="loginAsReturningGuest(\'' + escapeHtml(lastName) + '\',\'' + escapeHtml(displayName) + '\')" style="width:100%;padding:16px;font-size:17px;font-weight:700;margin-bottom:14px">Enter MCC Master</button>';
    } else {
      html += '<button class="btn btn-primary" onclick="loginAsProfile(\'' + escapeHtml(lastName) + '\')" style="width:100%;padding:16px;font-size:17px;font-weight:700;margin-bottom:14px">Enter MCC Master</button>';
    }
    html += '<button class="btn btn-outline" onclick="showNameEntry()" style="width:100%;padding:12px;font-size:14px;color:var(--text-light)">I\'m not ' + escapeHtml(displayName) + '</button>';
  } else {
    // First time — name entry
    html += '<p style="color:var(--text-light);margin-bottom:32px;font-size:15px">Enter your name to get started</p>';
    html += '<input type="text" id="profile-name-input" placeholder="Your first name" autocomplete="off" style="width:100%;padding:14px 16px;font-size:16px;font-weight:600;border-radius:12px;border:2px solid var(--border);background:var(--card-bg);color:var(--text);margin-bottom:8px;text-align:center;box-sizing:border-box" onkeydown="if(event.key===\'Enter\')confirmNameEntry()">';
    html += '<div id="profile-name-error" style="color:var(--error);font-size:13px;margin-bottom:16px;min-height:20px"></div>';
    html += '<button class="btn btn-primary" onclick="confirmNameEntry()" style="width:100%;padding:14px;font-size:16px;font-weight:700">Start Studying</button>';
  }
  html += '</div>';

  document.querySelectorAll('.page').forEach(function(pg) { pg.classList.remove('active'); });
  var profilePage = document.getElementById('profile-select-page');
  if (!profilePage) {
    profilePage = document.createElement('div');
    profilePage.id = 'profile-select-page';
    content.appendChild(profilePage);
  }
  profilePage.innerHTML = html;
  profilePage.style.display = 'block';

  // Auto-focus name input if present
  var nameInput = document.getElementById('profile-name-input');
  if (nameInput) setTimeout(function() { nameInput.focus(); }, 100);
}

function showNameEntry() {
  localStorage.removeItem('mcc_last_name');
  localStorage.removeItem('mcc_profile');
  showProfileSelect();
}

function getNextGuestNumber() {
  var num = parseInt(localStorage.getItem('mcc_guest_counter') || '0') + 1;
  localStorage.setItem('mcc_guest_counter', String(num));
  return num;
}

function loginAsGuest() {
  var guestNum = getNextGuestNumber();
  var guestId = 'guest_' + guestNum;
  var displayName = 'Guest ' + guestNum;
  localStorage.setItem('mcc_profile', guestId);
  localStorage.setItem('mcc_last_name', guestId);
  localStorage.setItem('mcc_last_display', displayName);
  App.guestId = 'profile_' + guestId;
  App.user = { name: displayName, email: displayName, isGuest: true };

  var sidebar = document.getElementById('sidebar');
  var bottomNav = document.getElementById('bottom-nav');
  var content = document.getElementById('content');
  if (sidebar) sidebar.style.display = '';
  if (bottomNav) bottomNav.style.display = '';
  content.style.marginLeft = '';

  var profilePage = document.getElementById('profile-select-page');
  if (profilePage) profilePage.remove();

  document.getElementById('user-email').textContent = displayName;
  finishInit();
}

function confirmNameEntry() {
  var input = document.getElementById('profile-name-input');
  var errorEl = document.getElementById('profile-name-error');
  if (!input) return;
  var name = input.value.trim().toLowerCase();
  if (!name) { input.style.borderColor = 'var(--error)'; errorEl.textContent = 'Please enter your name'; return; }
  if (ALLOWED_NAMES.indexOf(name) === -1) {
    input.style.borderColor = 'var(--error)';
    errorEl.innerHTML = 'User not found. <a href="#" onclick="event.preventDefault();loginAsGuest()" style="color:var(--primary);text-decoration:underline;font-weight:600">Sign in as guest?</a>';
    return;
  }
  loginAsProfile(name);
}

  localStorage.setItem('mcc_last_name', profileId);
  localStorage.setItem('mcc_last_display', displayName);

// ===== TUTORIAL =====

function startTutorial() {
  var steps = [
    { title: 'Welcome to MCC Master', text: 'Your all-in-one study tool for the MCCQE Part I. Everything here \u2014 the flashcards, quiz questions, clinical scenarios, lab values, and scoring criteria \u2014 is built from <strong>real medical references</strong> including Toronto Notes, Canadian clinical practice guidelines, and established MCCQE exam objectives. The content is accurate and evidence-based, not randomly generated.', target: null },
    { title: 'Flashcards', text: 'Over 10,000 flashcards organized by specialty. Each card is written from verified medical content and cross-referenced with standard Canadian medical education sources. You flip each card, self-evaluate, and the app tracks which topics you\'re weak in to prioritize your review.', target: 'flashcards' },
    { title: 'Practice Quiz', text: 'MCQ questions modeled on the real MCCQE format. Questions, answer choices, and explanations are grounded in established clinical guidelines and diagnostic criteria \u2014 not guesswork. After each quiz, you see exactly which areas need more work.', target: 'quiz' },
    { title: 'PatientBot', text: 'AI-powered simulated patient encounters. Each case is built from real clinical presentations, with accurate vitals, lab results, imaging findings, and physical exam signs that match the underlying diagnosis. You take a history, examine the patient, order real tests (with realistic results), give actual medications with correct doses, and perform procedures \u2014 all with a clinical consequence engine that tracks what happens to the patient based on your actions.', target: 'patientbot' },
    { title: 'PatientBot Scoring', text: 'After each case, you get an <strong>OSCE-style scorecard</strong> graded on 7 domains: History, Physical Exam, Investigations, Diagnosis, Management, Communication, and Patient Safety. The grading follows real MCCQE rubric standards with defined boundaries (A through F). Your actions have real consequences \u2014 give the wrong drug at the wrong dose and the patient\'s vitals will change accordingly.', target: 'patientbot' },
    { title: 'Daily Challenge', text: 'A structured daily session: 20 flashcards, 10 quiz questions, and 2 patient cases. Covers material across all specialties to build well-rounded knowledge. Completing it each day keeps your streak going and earns XP toward your level.', target: 'daily' },
    { title: 'Skill Map & Mastery', text: 'The dashboard tracks your mastery percentage for each specialty based on quiz scores and flashcard performance. Green means strong, yellow means decent, red means it needs work. Your weak areas get prioritized in Daily Challenges so you improve where it matters most.', target: 'dashboard' },
    { title: 'About the Content', text: 'A note on accuracy: all clinical content, drug dosages, lab reference ranges, and scoring criteria are sourced from established medical references. When PatientBot gives you lab results or vital sign changes, those numbers reflect what would actually happen in a real clinical scenario with that diagnosis and those interventions. This isn\'t a chatbot making things up \u2014 it\'s a structured clinical simulator with guardrails.', target: null },
    { title: 'Let\'s Get Started', text: 'Start with the <strong>Daily Challenge</strong> to try a bit of everything, or dive straight into <strong>Flashcards</strong> or <strong>PatientBot</strong>. Consistency beats intensity \u2014 even 20 minutes a day adds up fast.', target: null }
  ];

  App.tutorialSteps = steps;
  App.tutorialIndex = 0;
  renderTutorialStep();

function renderTutorialStep() {
  var step = App.tutorialSteps[App.tutorialIndex];
  var total = App.tutorialSteps.length;
  var current = App.tutorialIndex + 1;

  // Remove existing overlay
  var existing = document.getElementById('tutorial-overlay');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.id = 'tutorial-overlay';
  overlay.className = 'tutorial-overlay';

  var html = '<div class="tutorial-card">';
  html += '<div class="tutorial-progress">';
  for (var i = 0; i < total; i++) {
    html += '<div class="tutorial-dot' + (i <= App.tutorialIndex ? ' active' : '') + '"></div>';
  }
  html += '</div>';
  html += '<h3 style="margin:0 0 8px;font-size:20px">' + step.title + '</h3>';
  html += '<p style="color:var(--text-light);margin:0 0 24px;font-size:15px;line-height:1.6">' + step.text + '</p>';
  html += '<div style="display:flex;gap:12px;justify-content:space-between">';
  html += '<button class="btn btn-outline" onclick="endTutorial()" style="font-size:14px">Skip</button>';
  if (App.tutorialIndex < total - 1) {
    html += '<button class="btn btn-primary" onclick="nextTutorialStep()" style="font-size:14px;flex:1">Next (' + current + '/' + total + ')</button>';
  } else {
    html += '<button class="btn btn-success" onclick="endTutorial()" style="font-size:14px;flex:1">Let\'s Go! &#x1F680;</button>';
  }
  html += '</div></div>';

  overlay.innerHTML = html;
  document.body.appendChild(overlay);
}

function nextTutorialStep() {
  App.tutorialIndex++;
  if (App.tutorialIndex >= App.tutorialSteps.length) {
    endTutorial();
  } else {
    renderTutorialStep();
  }
}

function endTutorial() {
  var profileId = localStorage.getItem('mcc_profile');
  if (profileId) localStorage.setItem('mcc_tutorial_v2_' + profileId, '1');
  var overlay = document.getElementById('tutorial-overlay');
  if (overlay) overlay.remove();
}

function init() {
  // Check if profile is selected
  var savedProfile = localStorage.getItem('mcc_profile');
  if (!savedProfile) {
    showProfileSelect();
    // Still load specialties in background
    serverCall('getSpecialties').then(function(specs) {
      App.specialties = specs;
      populateSpecialtyDropdowns();
    });
    return;
  }

  // Load profile (whitelisted name or guest)
  var isKnownName = ALLOWED_NAMES.indexOf(savedProfile) !== -1;
  var isGuestProfile = savedProfile.indexOf('guest_') === 0;
  if (isKnownName || isGuestProfile) {
    var displayName = localStorage.getItem('mcc_last_display') || (savedProfile.charAt(0).toUpperCase() + savedProfile.slice(1));
    App.guestId = 'profile_' + savedProfile;
    App.user = { name: displayName, email: displayName, isGuest: true };
    document.getElementById('user-email').textContent = displayName;
  } else {
    App.guestId = getGuestId();
    App.user = { name: 'Guest', email: 'Guest', isGuest: true };
    document.getElementById('user-email').textContent = 'Guest';
  }

  serverCall('getCurrentUser').then(function(user) {
    if (!user.isGuest) {
      App.user = user;
      document.getElementById('user-email').textContent = user.email;
    }
    if (user.isDev) {
      var devNav = document.getElementById('nav-dev');
      if (devNav) devNav.style.display = '';
    }
  });

  finishInit();
}

function finishInit() {
  serverCall('getSpecialties').then(function(specs) {
    App.specialties = specs;
    populateSpecialtyDropdowns();
  });

  // Restore language setting and load glossary
  var savedLang = localStorage.getItem('mcc_lang');
  if (savedLang) {
    App.glossaryLang = savedLang;
    var langSelect = document.getElementById('lang-select');
    if (langSelect) langSelect.value = savedLang;
    loadGlossary();
  }

  loadDashboard();

  var lastVersion = localStorage.getItem('mcc_last_version');
  if (lastVersion !== APP_VERSION) {
    showVersionBanner();
  }
}

function showVersionBanner() {
  var existing = document.getElementById('version-banner');
  if (existing) existing.remove();

  var itemsHtml = '';
  for (var c = 0; c < APP_CHANGELOG.length; c++) {
    var entry = APP_CHANGELOG[c];
    itemsHtml += '<div class="version-entry">';
    itemsHtml += '<strong>v' + entry.version + '</strong> <span style="opacity:0.8">(' + entry.date + ')</span>';
    itemsHtml += '<ul>';
    for (var i = 0; i < entry.items.length; i++) {
      itemsHtml += '<li>' + escapeHtml(entry.items[i]) + '</li>';
    }
    itemsHtml += '</ul></div>';
  }

  var banner = document.createElement('div');
  banner.id = 'version-banner';
  banner.className = 'version-banner';
  banner.innerHTML =
    '<div class="version-banner-header">' +
      '<h3>MCC Master v' + APP_VERSION + '</h3>' +
      '<button class="version-toggle-btn" onclick="document.getElementById(\'version-changelog\').classList.toggle(\'open\')">What\'s New &#x25BC;</button>' +
    '</div>' +
    '<div id="version-changelog" class="version-changelog">' + itemsHtml + '</div>' +
    '<button class="btn version-got-it" onclick="dismissVersionBanner()">Got it!</button>';

  var dashboard = document.getElementById('dashboard-content');
  dashboard.parentNode.insertBefore(banner, dashboard);
}

function dismissVersionBanner() {
  localStorage.setItem('mcc_last_version', APP_VERSION);
  var banner = document.getElementById('version-banner');
  if (banner) banner.remove();
}

function populateSpecialtyDropdowns() {
  var mapping = {
    'flashcard-specialty': App.specialties.flashcards || [],
    'notes-specialty': App.specialties.bullet_notes || [],
    'dontmiss-specialty': App.specialties.dont_miss || []
  };

  Object.keys(mapping).forEach(function(id) {
    var sel = document.getElementById(id);
    if (!sel) return;
    var specs = mapping[id];
    sel.innerHTML = '<option value="All">All Specialties</option>';
    for (var i = 0; i < specs.length; i++) {
      sel.innerHTML += '<option value="' + escapeHtml(specs[i]) + '">' + escapeHtml(specs[i]) + '</option>';
    }
  });
}

function getSkillMastery(stats) {
  var masteryMap = {};
  // Build mastery from weakAreas (which has {specialty, avgScore})
  if (stats.weakAreas && stats.weakAreas.length > 0) {
    for (var i = 0; i < stats.weakAreas.length; i++) {
      masteryMap[stats.weakAreas[i].specialty] = stats.weakAreas[i].avgScore;
    }
  }
  return masteryMap;
}

function buildSkillRingSvg(pct, colorClass) {
  var r = 38, c = 2 * Math.PI * r;
  var offset = c - (pct / 100) * c;
  var strokeColor = colorClass === 'skill-green' ? '#4caf50' : colorClass === 'skill-yellow' ? '#ff9800' : colorClass === 'skill-red' ? '#f44336' : '#bdbdbd';
  var trackColor = 'rgba(0,0,0,0.06)';
  return '<svg class="skill-ring-svg" viewBox="0 0 88 88" width="88" height="88">' +
    '<circle cx="44" cy="44" r="' + r + '" fill="none" stroke="' + trackColor + '" stroke-width="7"/>' +
    '<circle cx="44" cy="44" r="' + r + '" fill="none" stroke="' + strokeColor + '" stroke-width="7" ' +
    'stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '" ' +
    'stroke-linecap="round" transform="rotate(-90 44 44)" style="transition:stroke-dashoffset 0.6s ease"/>' +
    '</svg>';
}

function renderDashboard(stats) {

  var lvl = stats.level || {};
  var lvlNum = lvl.number || 1;
  var dailyCards = getDailyCardCount_();

  var html = '';

  // Compact header with streak + level
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px">';
  html += '<div><h3 style="margin:0">Hey ' + escapeHtml(name) + ' &#x1F44B;</h3>';
  html += '<span style="font-size:13px;color:var(--text-light)">Lvl ' + lvlNum + ' &bull; ' + escapeHtml(lvl.name || 'Medical Student') + ' &bull; ' + (stats.totalPoints || 0) + ' XP</span></div>';
  if (stats.streak > 0) {
    html += '<div class="dash-streak">' + stats.streak + ' day streak! &#x1F525;</div>';
  }
  html += '</div>';

  // XP progress bar (compact)
  html += '<div class="progress-bar" style="margin-bottom:24px;height:6px"><div class="progress-fill" style="width:' + (lvl.progress || 0) + '%"></div></div>';

  // ===== QUICK ACTIONS - 4 big cards =====
  html += '<div class="quick-actions">';

  html += '<div class="quick-action-card" onclick="navigateTo(\'flashcards\')" style="background:linear-gradient(135deg,#667eea,#764ba2)">';
  html += '<div class="qa-icon">&#x1F4DA;</div>';
  html += '<div class="qa-label">Study</div>';
  html += '<div class="qa-sub">Card ' + (loadFlashcardProgress_() ? loadFlashcardProgress_().index + 1 : 1) + ' of 10K</div>';
  html += '</div>';

  // Quiz
  html += '<div class="quick-action-card" onclick="navigateTo(\'quiz\')" style="background:linear-gradient(135deg,#f093fb,#f5576c)">';
  html += '<div class="qa-icon">&#x270F;&#xFE0F;</div>';
  html += '<div class="qa-label">Quiz</div>';
  html += '<div class="qa-sub">' + (stats.avgScore || 0) + '% avg &bull; ' + stats.totalQuizzes + ' done</div>';
  html += '</div>';

  // PatientBot
  html += '<div class="quick-action-card" onclick="navigateTo(\'patientbot\')" style="background:linear-gradient(135deg,#4facfe,#00f2fe)">';
  html += '<div class="qa-icon">&#x1FA7A;</div>';
  html += '<div class="qa-label">PatientBot</div>';
  html += '<div class="qa-sub">' + (stats.pbCorrect || 0) + '/' + (stats.pbTotal || 0) + ' diagnosed</div>';
  html += '</div>';

  // Daily Challenge
  var dailyDone = stats.dailyCompleted;
  html += '<div class="quick-action-card" onclick="navigateTo(\'daily\')" style="background:linear-gradient(135deg,' + (dailyDone ? '#11998e,#38ef7d' : '#fc4a1a,#f7b733') + ')">';
  html += '<div class="qa-icon">' + (dailyDone ? '&#x2705;' : '&#x2B50;') + '</div>';
  html += '<div class="qa-label">Daily</div>';
  html += '<div class="qa-sub">' + (dailyDone ? 'Complete!' : 'Not done yet') + '</div>';
  html += '</div>';

  html += '</div>';

  // Daily card goal meter (compact)
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;padding:12px 16px;background:var(--card);border-radius:12px;border:1px solid var(--border)">';
  var dashGoal = getDailyGoal_();
  html += '<span style="font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer" onclick="promptDailyGoal()">Today: ' + dailyCards + '/' + dashGoal + '</span>';
  var goalPct = Math.min(100, Math.round((dailyCards / dashGoal) * 100));
  html += '<div class="progress-bar" style="flex:1;height:6px"><div class="progress-fill" style="width:' + goalPct + '%;background:' + (goalPct >= 100 ? 'var(--success)' : 'var(--accent)') + '"></div></div>';
  if (goalPct >= 100) html += '<span style="font-size:13px;color:var(--success);font-weight:700">&#x2705;</span>';

  // ===== SKILL MAP (compact) =====
  var masteryMap = getSkillMastery(stats);

  html += '<div class="skill-map">';

  var weakestKey = null, weakestPct = 101;
  for (var s = 0; s < SKILL_MAP.length; s++) {
    var sk = SKILL_MAP[s];
    var pct = masteryMap[sk.key] !== undefined ? Math.round(masteryMap[sk.key]) : 0;
    var colorClass = pct === 0 ? 'skill-grey' : pct > 70 ? 'skill-green' : pct >= 40 ? 'skill-yellow' : 'skill-red';
    if (pct < weakestPct) { weakestPct = pct; weakestKey = sk; }

    html += '<div class="skill-node ' + colorClass + '" onclick="navigateTo(\'flashcards\')" title="' + escapeHtml(sk.key) + ' - ' + pct + '%">';

    html += '<div class="achievement-row">';

    for (var i = 0; i < show.length; i++) {
      html += '<div class="achievement-badge" title="' + escapeHtml(show[i].desc) + '">';
      html += '<span class="achievement-icon">' + show[i].icon + '</span>';
      html += '<span class="achievement-name">' + escapeHtml(show[i].name) + '</span>';
      html += '</div>';

    if (stats.achievements.length > 5) {

    }

  }

  // Recent quizzes
  if (stats.recentQuizzes.length > 0) {
    html += '<div class="card"><h3 class="section-title">Recent Quizzes</h3>';
    for (var i = 0; i < stats.recentQuizzes.length; i++) {
      var q = stats.recentQuizzes[i];
      html += '<div class="weak-area-row">';
      html += '<span>' + escapeHtml(q.specialty) + ' (v' + escapeHtml(q.version) + ')</span>';
      html += '<span style="font-weight:700">' + q.percentage + '% (' + q.score + '/' + q.total + ')</span>';
      html += '</div>';
    }
    html += '</div>';
  } else {
    html += '<div class="card" style="text-align:center;padding:40px">';
    html += '<h3>Get Started!</h3>';
    html += '<p style="color:var(--text-light);margin:8px 0 20px">Take a quiz or try the Daily Challenge</p>';
    html += '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">';
    html += '<button class="btn btn-primary" onclick="navigateTo(\'daily\')">Daily Challenge</button>';
    html += '<button class="btn btn-accent" onclick="navigateTo(\'quiz\')">Start a Quiz</button>';
    html += '</div></div>';
  }

  el.innerHTML = html;
}

function startDailyCards() {

  App.dailyCardFlipped = false;

  renderDailyCard();
}

function renderDailyCard() {
  var el = document.getElementById('daily-content');
  var cards = App.dailyData.flashcards;

  if (App.dailyCardIndex >= cards.length) {
    startDailyQuiz();
    return;
  }

  var card = cards[App.dailyCardIndex];
  var progress = (App.dailyCardIndex + 1) + ' / ' + cards.length;

  var html = '<div class="daily-phase-bar"><span>Phase 1/3: Flashcards</span><span>' + progress + '</span></div>';
  html += '<div class="daily-card-progress-bar"><div class="daily-card-progress-fill" style="width:' + ((App.dailyCardIndex / cards.length) * 100) + '%"></div></div>';

  html += '<div class="flashcard-meta">' + (card.isWeak ? '<span class="badge badge-hy" style="background:var(--warning)">Review</span> ' : '') + '<span>' + escapeHtml(card.specialty || '') + (card.topic ? ' &mdash; ' + escapeHtml(card.topic) : '') + '</span></div>';
  html += '<div class="flashcard-container"><div class="flashcard' + (App.dailyCardFlipped ? ' flipped' : '') + '" onclick="flipDailyCard()">';
  html += '<div class="flashcard-front"><div>' + escapeHtml(card.front) + '</div></div>';
  html += '<div class="flashcard-back"><div>' + escapeHtml(card.back) + '</div></div>';
  html += '</div></div>';

  if (App.dailyCardFlipped) {
    html += '<div class="flashcard-nav">';
    html += '<button class="btn btn-error" onclick="rateDailyCard(\'missed\')" style="flex:1;padding:14px;font-size:15px">Missed</button>';
    html += '<button class="btn btn-warning" onclick="rateDailyCard(\'shaky\')" style="flex:1;padding:14px;font-size:15px">Shaky</button>';
    html += '<button class="btn btn-success" onclick="rateDailyCard(\'knew\')" style="flex:1;padding:14px;font-size:15px">Knew It</button>';
    html += '</div>';
    html += '<div style="text-align:center;margin-top:8px;color:var(--text-light);font-size:12px">Keyboard: 1 = Missed &bull; 2 = Shaky &bull; 3 = Knew It</div>';
  } else {
    html += '<div class="flashcard-nav">';
    html += '<button class="btn btn-accent" onclick="flipDailyCard()" style="flex:1;padding:14px;font-size:15px">Tap to Flip</button>';
    html += '</div>';
    html += '<div style="text-align:center;margin-top:8px;color:var(--text-light);font-size:12px">Keyboard: Space to flip</div>';
  }

  el.innerHTML = html;
}

function flipDailyCard() {
  App.dailyCardFlipped = !App.dailyCardFlipped;
  renderDailyCard();
}

function rateDailyCard(rating) {
  App.dailyCardRatings.push(rating);
  // Save for spaced repetition (fire-and-forget)
  var card = App.dailyData.flashcards[App.dailyCardIndex];
  if (card) serverCall('saveCardRating', card.front, rating, 'daily').catch(function(){});
  App.dailyCardIndex++;
  App.dailyCardFlipped = false;
  renderDailyCard();
}

function startDailyQuiz() {
  App.dailyPhase = 'quiz';
  App.dailyQuizIndex = 0;
  App.dailyQuizAnswers = {};
  renderDailyQuiz();
}

function renderDailyQuiz() {
  var el = document.getElementById('daily-content');
  var questions = App.dailyData.mcq;

  if (App.dailyQuizIndex >= questions.length) {
    startDailyPB();
    return;
  }

  var q = questions[App.dailyQuizIndex];
  var total = questions.length;
  var current = App.dailyQuizIndex + 1;
  var selected = App.dailyQuizAnswers[App.dailyQuizIndex] || '';

  var html = '<div class="daily-phase-bar"><span>Phase 2/3: Quiz</span><span>' + current + ' / ' + total + '</span></div>';
  html += '<div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:' + ((current / total) * 100) + '%"></div></div>';

  html += '<div class="card">';
  html += '<p style="font-size:14px;color:var(--text-light);margin-bottom:4px">' + escapeHtml(q.specialty) + '</p>';
  html += '<p style="font-size:15px;line-height:1.7;margin-bottom:20px">' + medHtml(q.question) + '</p>';

  var opts = ['A', 'B', 'C', 'D', 'E'];
  for (var i = 0; i < opts.length; i++) {
    var opt = opts[i];
    if (!q.options[opt]) continue;
    var cls = 'quiz-option' + (selected === opt ? ' selected' : '');
    html += '<div class="' + cls + '" onclick="selectDailyQuizAnswer(\'' + opt + '\')">';
    html += '<strong>' + opt + '.</strong> ' + escapeHtml(q.options[opt]);
    html += '</div>';
  }
  html += '</div>';

  html += '<div class="quiz-q-nav">';
  if (App.dailyQuizIndex > 0) {
    html += '<button class="btn btn-outline" onclick="App.dailyQuizIndex--;renderDailyQuiz()">Prev</button>';
  } else {
    html += '<span></span>';
  }
  var answered = Object.keys(App.dailyQuizAnswers).length;
  html += '<span style="color:var(--text-light);font-size:13px">' + answered + '/' + total + '</span>';
  if (current === total) {
    html += '<button class="btn btn-success" onclick="startDailyPB()">Next Phase</button>';
  } else {
    html += '<button class="btn btn-primary" onclick="App.dailyQuizIndex++;renderDailyQuiz()">Next</button>';
  }
  html += '</div>';

  el.innerHTML = html;
}

function selectDailyQuizAnswer(opt) {
  App.dailyQuizAnswers[App.dailyQuizIndex] = opt;
  renderDailyQuiz();
}

function startDailyPB() {
  App.dailyPhase = 'pb';
  App.dailyPBIndex = 0;
  App.pbCaseScores = [];
  startDailyPBCase();
}

function startDailyPBCase() {
  var el = document.getElementById('daily-content');
  var specs = App.dailyData.pbSpecialties;

  if (App.dailyPBIndex >= specs.length) {
    finishDailyChallenge();
    return;
  }

  el.innerHTML = '<div class="daily-phase-bar"><span>Phase 3/3: PatientBot</span><span>Case ' + (App.dailyPBIndex + 1) + ' / ' + specs.length + '</span></div>' +
    '<div class="loading-overlay"><div class="spinner"></div><p style="margin-top:12px;color:var(--text-light)">Generating case...</p></div>';

  serverCall('startPatientBotCase', specs[App.dailyPBIndex], false, 'medium').then(function(result) {
    App.pbCaseId = result.caseId;
    App.pbSpecialty = result.specialty;
    App.pbDiagnosis = null;
    App.pbPatientInfo = null;
    App.pbDiagnosing = false;
    App.pbDiagAttempts = 0;
    App.pbDiagResolved = false;
    App.pbPartialUsed = false;
    App.pbPartialFeedback = null;
    App.pbPartialScore = null;
    App.pbScorecard = null;
    App.pbCurrentCase = App.dailyPBIndex + 1;
    App.pbTotalCases = specs.length;

    var msg = stripPatientJSON(result.initialMessage);
    if (result.patientInfo) {
      App.pbPatientInfo = result.patientInfo;
      App.pbDiagnosis = result.patientInfo.diagnosis;
    }

    App.pbHistory = [{ role: 'assistant', content: msg }];
    renderDailyPBChat();
  }).catch(function(e) {
    el.innerHTML = '<div class="card"><p>Error: ' + escapeHtml(e.message || String(e)) + '</p><button class="btn btn-primary" onclick="startDailyPBCase()">Retry</button></div>';
  });
}

function renderDailyPBChat() {
  var el = document.getElementById('daily-content');
  var html = '<div class="daily-phase-bar"><span>Phase 3/3: PatientBot</span><span>Case ' + (App.dailyPBIndex + 1) + ' / ' + App.dailyData.pbSpecialties.length + '</span></div>';

  // Reuse PB rendering
  html += renderPBChatInner();
  el.innerHTML = html;

  var msgs = document.getElementById('pb-messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
  if (App.pbDiagnosing) {
    var dinput = document.getElementById('pb-diag-input');
    if (dinput) dinput.focus();
  }
}

function finishDailyPBCase() {
  if (!App.pbDiagResolved) {
    App.pbCaseScores.push({ specialty: App.pbSpecialty, caseNum: App.dailyPBIndex + 1, correct: false, diagnosis: App.pbDiagnosis, attempts: 0, skipped: true });
  }
  App.dailyPBIndex++;
  App.pbCaseId = null;
  App.pbHistory = [];
  startDailyPBCase();
}

function finishDailyChallenge() {
  // Calculate scores
  var cardKnew = App.dailyCardRatings.filter(function(r) { return r === 'knew'; }).length;
  var cardShaky = App.dailyCardRatings.filter(function(r) { return r === 'shaky'; }).length;
  var cardPoints = cardKnew * POINTS.DAILY_CARD_KNEW + cardShaky * POINTS.DAILY_CARD_SHAKY;

  var quizCorrect = 0;
  var quizQuestions = App.dailyData.mcq;
  for (var i = 0; i < quizQuestions.length; i++) {
    if (App.dailyQuizAnswers[i] === quizQuestions[i].correct) quizCorrect++;
  }
  var quizPoints = quizCorrect * POINTS.QUIZ_CORRECT;

  var pbCorrect = App.pbCaseScores.filter(function(s) { return s.correct; }).length;
  var pbPoints = pbCorrect * POINTS.PB_CORRECT;
  App.pbCaseScores.forEach(function(s) { if (s.correct && s.attempts === 1) pbPoints += POINTS.PB_FIRST_TRY; });

  var totalPoints = cardPoints + quizPoints + pbPoints + POINTS.DAILY_COMPLETE;

  // Save result
  serverCall('saveProgress', 'daily_result', {
    date: App.dailyData.date,
    cardKnew: cardKnew,
    cardShaky: cardShaky,
    cardTotal: App.dailyCardRatings.length,
    quizCorrect: quizCorrect,
    quizTotal: quizQuestions.length,
    pbCorrect: pbCorrect,
    pbTotal: App.pbCaseScores.length,
    points: totalPoints
  });

  // Show summary
  var el = document.getElementById('daily-content');
  var html = '<div class="card" style="text-align:center;padding:40px">';
  html += '<div style="font-size:64px;margin-bottom:12px">&#x1F389;</div>';
  html += '<h2>Challenge Complete!</h2>';
  html += '<div class="daily-score-big">+' + totalPoints + ' XP</div>';
  html += '</div>';

  html += '<div class="card">';
  html += '<h3 class="section-title">Breakdown</h3>';
  html += '<div class="weak-area-row"><span>Flashcards (' + cardKnew + ' knew, ' + cardShaky + ' shaky)</span><span>+' + cardPoints + ' XP</span></div>';

function togglePBLibrary() {
  var pbEl = document.getElementById('patientbot-content');
  var libEl = document.getElementById('pb-library-content');
  var btn = document.getElementById('pb-library-btn');

  if (libEl.style.display === 'none') {
    pbEl.style.display = 'none'; libEl.style.display = 'block';
    btn.classList.add('btn-primary');
    loadPBLibrary();
  } else {
    pbEl.style.display = 'block'; libEl.style.display = 'none';
    btn.classList.remove('btn-primary');
  }
}

function loadPBLibrary() {
  var el = document.getElementById('pb-library-content');
  el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
  serverCall('getPBCaseLibrary').then(function(cases) {
    if (!cases || cases.length === 0) {
      el.innerHTML = '<p class="empty-state">No completed cases yet. Finish a PatientBot case (with diagnosis) to see it here!</p>';
      return;
    }
    var html = '<div style="margin-bottom:16px;color:var(--text-light)">' + cases.length + ' past cases</div>';
    for (var i = 0; i < cases.length; i++) {
      var c = cases[i];
      var dateStr = c.date ? new Date(c.date).toLocaleDateString('en-CA', { month: 'short', day: 'numeric' }) : '';
      var icon = c.correct ? '✅' : '❌';
      html += '<div class="card" style="padding:16px;margin-bottom:10px;cursor:pointer" onclick="viewPBCase(' + i + ')">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center">';
      html += '<div><strong>' + icon + ' ' + escapeHtml(c.specialty) + '</strong>';
      html += '<br><span style="font-size:13px;color:var(--text-light)">Dx: ' + escapeHtml(c.diagnosis || 'Unknown') + '</span></div>';
      html += '<span style="font-size:12px;color:var(--text-light)">' + dateStr + '</span>';
      html += '</div></div>';
    }
    el.innerHTML = html;
    App.pbLibraryCases = cases;
  }).catch(function(e) {
    el.innerHTML = '<div class="card"><p>Error: ' + escapeHtml(e.message || String(e)) + '</p></div>';
  });
}

function viewPBCase(idx) {
  var c = App.pbLibraryCases[idx]; if (!c) return;
  var el = document.getElementById('pb-library-content');
  var dateStr = c.date ? new Date(c.date).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
  var html = '<button class="btn btn-sm" onclick="loadPBLibrary()" style="margin-bottom:16px">&larr; Back to Cases</button>';
  html += '<div class="card" style="padding:16px;margin-bottom:16px">';
  html += '<h3>' + (c.correct ? '✅' : '❌') + ' ' + escapeHtml(c.specialty) + ' &mdash; ' + escapeHtml(c.diagnosis || 'Unknown') + '</h3>';
  html += '<p style="font-size:13px;color:var(--text-light)">' + dateStr + ' &bull; ' + c.attempts + ' attempt(s)</p>';
  if (c.feedback) html += '<p style="margin-top:8px;font-size:14px">' + escapeHtml(c.feedback) + '</p>';
  html += '</div>';

  // Render transcript
  html += '<div class="chat-container" style="max-height:500px;overflow-y:auto">';
  html += '<div class="chat-messages" style="padding:16px">';
  for (var i = 0; i < c.transcript.length; i++) {
    var m = c.transcript[i];
    var cls = m.role === 'user' ? 'user-message' : 'bot-message';
    html += '<div class="chat-bubble ' + cls + '">' + escapeHtml(m.content) + '</div>';
  }
  html += '</div></div>';
  el.innerHTML = html;
}

    if (totalActivity === 0) html += '<span style="opacity:0.5">No activity</span>';

  html += '<h3 style="margin:24px 0 16px">Activity by Day</h3>';

    html += '<p style="color:var(--text-light)">No activity data yet.</p>';

      html += '</div>';
    }

  html += '</div>';

// =============================================
// FLASHCARDS
// =============================================

function getFlashcardProgressKey_(specialty) {
  return 'mcc_fc_progress_' + (specialty || 'All');
}

function saveFlashcardProgress_() {
  var key = getFlashcardProgressKey_(App.flashcardSpecialty);
  var progress = {
    index: App.flashcardIndex,
    gotIt: App.flashcardGotIt || 0,
    review: App.flashcardReview || 0,
    total: App.flashcards.length,
    timestamp: Date.now()
  };
  localStorage.setItem(key, JSON.stringify(progress));
}

function loadFlashcardProgress_() {
  var key = getFlashcardProgressKey_(App.flashcardSpecialty);
  try {
    var saved = JSON.parse(localStorage.getItem(key));
    // Only require index < current length — allow card count to change slightly
    if (saved && saved.index > 0 && saved.index < App.flashcards.length) {
      return saved;
    }
  } catch(e) {}
  return null;
}

function loadFlashcards(specialty) {
  specialty = specialty || 'All';
  App.flashcardSpecialty = specialty;
  var el = document.getElementById('flashcard-content');
  el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
  serverCall('getFlashcards', specialty).then(function(data) {
    App.flashcardsAll = data; App.flashcards = data;
    if (document.getElementById('flashcard-hy-only').checked) App.flashcards = data.filter(function(c) { return c.hyFlag; });

    // Resume saved progress
    var saved = loadFlashcardProgress_();
    if (saved && saved.index > 0) {
      App.flashcardIndex = saved.index;
      App.flashcardGotIt = saved.gotIt;
      App.flashcardReview = saved.review;
      App.flashcardReviewCards = [];
      App.flashcardFlipped = false;
      App.flashcardResumed = true;
    } else {
      App.flashcardIndex = 0; App.flashcardFlipped = false; App.flashcardGotIt = 0; App.flashcardReview = 0; App.flashcardReviewCards = [];
      App.flashcardResumed = false;
    }
    renderFlashcard();
  }).catch(function(e) { el.innerHTML = '<div class="card"><p>Error: ' + escapeHtml(e.message || String(e)) + '</p></div>'; });
}

function filterHYFlashcards() {
  App.flashcards = document.getElementById('flashcard-hy-only').checked ? App.flashcardsAll.filter(function(c) { return c.hyFlag; }) : App.flashcardsAll;
  App.flashcardIndex = 0; App.flashcardFlipped = false; App.flashcardGotIt = 0; App.flashcardReview = 0; App.flashcardReviewCards = [];
  localStorage.removeItem(getFlashcardProgressKey_(App.flashcardSpecialty));
  renderFlashcard();
}

function getDailyGoal_() {
  return parseInt(localStorage.getItem('mcc_daily_goal')) || 100;
}

function setDailyGoal_(val) {
  var goal = Math.max(10, Math.min(500, parseInt(val) || 100));
  localStorage.setItem('mcc_daily_goal', goal);
  return goal;
}

function getDailyCardCount_() {
  var today = new Date().toISOString().split('T')[0];
  try {
    var saved = JSON.parse(localStorage.getItem('mcc_fc_daily'));
    if (saved && saved.date === today) return saved.count;
  } catch(e) {}
  return 0;
}

function promptDailyGoal() {
  var current = getDailyGoal_();
  var input = prompt('Set your daily flashcard goal (10-500):', current);
  if (input !== null && input !== '') {
    var newGoal = setDailyGoal_(input);
    // Re-render current page
    if (App.currentPage === 'dashboard') loadDashboard();
    else if (App.currentPage === 'flashcards') renderFlashcard();
  }
}

function incrementDailyCardCount_() {
  var today = new Date().toISOString().split('T')[0];
  var count = getDailyCardCount_() + 1;
  localStorage.setItem('mcc_fc_daily', JSON.stringify({ date: today, count: count }));
  return count;
}

function renderFlashcard() {
  var el = document.getElementById('flashcard-content');
  if (App.flashcards.length === 0) { el.innerHTML = '<p class="empty-state">No flashcards found for this selection.</p>'; return; }

  if (App.flashcardIndex >= App.flashcards.length) { renderFlashcardDone(); return; }

  var card = App.flashcards[App.flashcardIndex];
  var total = App.flashcards.length;
  var current = App.flashcardIndex + 1;
  var dailyCount = getDailyCardCount_();
  var dailyGoal = getDailyGoal_();
  var dailyPct = Math.min(100, Math.round((dailyCount / dailyGoal) * 100));

  var html = '';

  // Daily goal meter
  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px">';
  html += '<span style="font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;cursor:pointer" onclick="promptDailyGoal()" title="Click to change goal">Today: ' + dailyCount + '/' + dailyGoal + '</span>';
  html += '<div class="progress-bar" style="flex:1;height:8px"><div class="progress-fill" style="width:' + dailyPct + '%;background:' + (dailyPct >= 100 ? 'var(--success)' : 'var(--primary)') + '"></div></div>';
  if (dailyPct >= 100) html += '<span style="font-size:13px;font-weight:700;color:var(--success)">&#x2705;</span>';
  html += '</div>';

  if (App.flashcardResumed && App.flashcardIndex > 0) {
    html += '<div style="background:rgba(0,188,212,0.1);border:1px solid var(--accent);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">';
    html += '<span style="font-size:14px;color:var(--text)">Resumed from card ' + current + ' of ' + total + '</span>';
    html += '<button class="btn btn-sm btn-outline" onclick="restartFlashcards()">Start Over</button>';
    html += '</div>';
  }

  // Card counter + back button
  html += '<div class="flashcard-meta">';
  if (App.flashcardIndex > 0) {
    html += '<button class="btn btn-outline" onclick="prevFlashcard()" style="padding:10px 20px;font-size:15px;margin-right:12px;font-weight:700">&#x2190; Back</button>';
  }
  html += '<span>' + current + ' / ' + total + '</span>';
  if (card.hyFlag) html += ' <span class="hy-badge">&#x2B50; Important</span>';
  html += '<br><span>' + escapeHtml(card.specialty) + ' &mdash; ' + escapeHtml(card.topic) + '</span></div>';
  html += '<div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:' + ((current / total) * 100) + '%"></div></div>';
  html += '<div class="flashcard-container"><div class="flashcard' + (App.flashcardFlipped ? ' flipped' : '') + '" onclick="flipFlashcard()">';
  html += '<div class="flashcard-front"><div>' + medHtml(card.front) + '</div></div>';
  html += '<div class="flashcard-back"><div>' + medHtml(card.back) + '</div></div>';
  html += '</div></div>';

  if (App.flashcardFlipped) {
    html += '<div class="flashcard-nav">';
    html += '<button class="btn btn-error" onclick="rateFlashcard(false)" style="flex:1;padding:14px;font-size:15px">&#x274C; I Was Wrong</button>';
    html += '<button class="btn btn-success" onclick="rateFlashcard(true)" style="flex:1;padding:14px;font-size:15px">&#x2705; I Was Right</button>';
    html += '</div>';
    html += '<div style="text-align:center;margin-top:10px;color:var(--text-light);font-size:12px;line-height:1.5;max-width:500px;margin-left:auto;margin-right:auto">';
    html += '&#x1F4CA; Your responses are tracked to build your weak areas profile. Cards you miss will appear more often in Daily Challenges.';
    html += '<br>Keyboard: 1 = Wrong &bull; 2 = Right &bull; &#x2190; Back</div>';
  } else {
    html += '<div class="flashcard-nav">';
    html += '<button class="btn btn-accent" onclick="flipFlashcard()" style="flex:1;padding:14px;font-size:15px">Tap to Flip</button>';
    html += '</div>';
    html += '<div style="text-align:center;margin-top:8px;color:var(--text-light);font-size:12px">Keyboard: Space to flip &bull; &#x2190; Back</div>';
  }
  el.innerHTML = html;
}

function renderFlashcardDone() {
  var el = document.getElementById('flashcard-content');
  var total = App.flashcards.length;
  var got = App.flashcardGotIt || 0;
  var review = App.flashcardReview || 0;
  var pct = total > 0 ? Math.round((got / total) * 100) : 0;
  var points = got * POINTS.FLASHCARD_GOT_IT + review * POINTS.FLASHCARD_REVIEW;

  var html = '<div class="card" style="text-align:center;padding:40px 24px">';
  html += '<div class="daily-card-score-ring"><div class="daily-card-score-number">' + got + '/' + total + '</div><div class="daily-card-score-label">' + pct + '% Got It</div></div>';
  html += '<p style="margin:16px 0;color:var(--text-light)">' + review + ' cards to review again</p>';
  html += '<p style="margin:8px 0;color:var(--accent);font-weight:700">+' + points + ' XP earned</p>';
  html += '<div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">';
  if (review > 0) {
    html += '<button class="btn btn-primary" onclick="restartFlashcardsReview()">Study Review Cards (' + review + ')</button>';
  }
  html += '<button class="btn btn-outline" onclick="restartFlashcards()">Restart All</button>';
  html += '</div></div>';
  el.innerHTML = html;

  // Save points and clear progress (session complete)
  localStorage.removeItem(getFlashcardProgressKey_(App.flashcardSpecialty));
  if (points > 0) {
    serverCall('saveProgress', 'flashcard_result', { got: got, review: review, total: total, points: points, specialty: App.flashcardSpecialty }, App.guestId);
  }
}

function flipFlashcard() { App.flashcardFlipped = !App.flashcardFlipped; renderFlashcard(); }

function rateFlashcard(gotIt) {
  if (!App.flashcardGotIt) App.flashcardGotIt = 0;
  if (!App.flashcardReview) App.flashcardReview = 0;
  if (!App.flashcardReviewCards) App.flashcardReviewCards = [];

  var card = App.flashcards[App.flashcardIndex];
  if (gotIt) {
    App.flashcardGotIt++;
  } else {
    App.flashcardReview++;
    App.flashcardReviewCards.push(card);
  }

  // Save card rating server-side for spaced repetition
  if (card) {
    serverCall('saveCardRating', card.front, gotIt ? 'knew' : 'missed', 'flashcard', App.guestId).catch(function(){});
  }

  incrementDailyCardCount_();
  App.flashcardIndex++;
  App.flashcardFlipped = false;
  App.flashcardResumed = false;
  saveFlashcardProgress_();
  renderFlashcard();
}

function restartFlashcards() {
  App.flashcardIndex = 0; App.flashcardFlipped = false;
  App.flashcardGotIt = 0; App.flashcardReview = 0; App.flashcardReviewCards = [];
  App.flashcardResumed = false;
  localStorage.removeItem(getFlashcardProgressKey_(App.flashcardSpecialty));
  renderFlashcard();
}

function restartFlashcardsReview() {
  App.flashcards = App.flashcardReviewCards.slice();
  App.flashcardIndex = 0; App.flashcardFlipped = false;
  App.flashcardGotIt = 0; App.flashcardReview = 0; App.flashcardReviewCards = [];
  App.flashcardResumed = false;
  localStorage.removeItem(getFlashcardProgressKey_(App.flashcardSpecialty));
  renderFlashcard();
}

function prevFlashcard() { if (App.flashcardIndex > 0) { App.flashcardIndex--; App.flashcardFlipped = false; renderFlashcard(); } }
function nextFlashcard() { if (App.flashcardIndex < App.flashcards.length - 1) { App.flashcardIndex++; App.flashcardFlipped = false; renderFlashcard(); } }

function loadBulletNotes(specialty) {
  var el = document.getElementById('notes-content');
  el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
  serverCall('getBulletNotes', specialty || 'All').then(function(data) { App.bulletNotes = data; renderBulletNotes(); })
    .catch(function(e) { el.innerHTML = '<div class="card"><p>Error: ' + escapeHtml(e.message || String(e)) + '</p></div>'; });
}

function renderBulletNotes(filterText) {
  var el = document.getElementById('notes-content');
  var notes = App.bulletNotes;
  var longForm = document.getElementById('notes-long-form') && document.getElementById('notes-long-form').checked;

  if (filterText) { var q = filterText.toLowerCase(); notes = notes.filter(function(n) { return n.note.toLowerCase().indexOf(q) !== -1 || n.topic.toLowerCase().indexOf(q) !== -1 || (n.specialty && n.specialty.toLowerCase().indexOf(q) !== -1); }); }
  if (notes.length === 0) { el.innerHTML = '<p class="empty-state">No notes found.</p>'; return; }

  // Group by specialty → topic
  var specGroups = {}; var specOrder = [];
  notes.forEach(function(n) {
    var spec = n.specialty || 'General';
    if (!specGroups[spec]) { specGroups[spec] = {}; specOrder.push(spec); }
    var topic = n.topic || 'General';
    if (!specGroups[spec][topic]) specGroups[spec][topic] = [];
    specGroups[spec][topic].push(n);
  });

  var html = '<p style="color:var(--text-light);margin-bottom:16px">' + notes.length + ' notes across ' + specOrder.length + ' specialties</p>';

  for (var si = 0; si < specOrder.length; si++) {
    var spec = specOrder[si];
    var topics = specGroups[spec];
    var topicKeys = Object.keys(topics);
    var specCount = 0;
    topicKeys.forEach(function(t) { specCount += topics[t].length; });

    html += '<div class="card" style="margin-bottom:12px;padding:0;overflow:hidden">';
    // Specialty header (clickable to expand/collapse)
    html += '<div class="notes-topic-header" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'open\')" style="padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:10px">';
    html += '<span class="arrow" style="font-size:12px;color:var(--text-light);transition:transform 0.2s">&#x25B6;</span>';
    html += '<strong style="font-size:16px;flex:1">' + escapeHtml(spec) + '</strong>';
    html += '<span style="background:var(--primary);color:white;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700">' + specCount + '</span>';
    html += '</div>';

    // Topics within specialty
    html += '<div class="notes-list" style="display:none;padding:0 20px 16px;border-top:1px solid var(--border)">';
    for (var ti = 0; ti < topicKeys.length; ti++) {
      var topic = topicKeys[ti];
      var items = topics[topic];
      html += '<div style="margin-top:12px">';
      html += '<div style="font-size:14px;font-weight:700;color:var(--primary);margin-bottom:6px">' + escapeHtml(topic) + ' <span style="color:var(--text-light);font-weight:400">(' + items.length + ')</span></div>';

      if (longForm) {
        // Long form: full text for each note
        for (var j = 0; j < items.length; j++) {
          html += '<div style="padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05);font-size:14px;line-height:1.7">' + escapeHtml(items[j].note) + '</div>';
        }
      } else {
        // Short form: compact bullets
        html += '<ul style="padding-left:18px;margin:0">';
        for (var j = 0; j < items.length; j++) {
          var shortNote = items[j].note.length > 120 ? items[j].note.substring(0, 120) + '...' : items[j].note;
          html += '<li style="margin:3px 0;font-size:13px;line-height:1.5;color:var(--text)">' + escapeHtml(shortNote) + '</li>';
        }
        html += '</ul>';
      }
      html += '</div>';
    }
    html += '</div></div>';
  }

  // Auto-expand if filtering or only a few specialties
  if (filterText || specOrder.length <= 3) {
    setTimeout(function() {
      document.querySelectorAll('.notes-topic-header').forEach(function(h) {
        h.classList.add('open');
        if (h.nextElementSibling) { h.nextElementSibling.classList.add('open'); h.nextElementSibling.style.display = ''; }
      });
    }, 50);
  }

  el.innerHTML = html;
}

function filterBulletNotes(text) { renderBulletNotes(text); }
function toggleNotesForm() { var search = document.getElementById('notes-search'); renderBulletNotes(search ? search.value : ''); }

function showQuizSetup() {

  var el = document.getElementById('quiz-content');

  for (var i = 0; i < specs.length; i++) html += '<option value="' + escapeHtml(specs[i]) + '">' + escapeHtml(specs[i]) + '</option>';
  html += '</select></div>';

  html += '<div class="form-group"><label>Version</label>';
  html += '<select id="quiz-version" style="width:100%">';

  html += '<button class="quiz-count-btn" onclick="setQuizDiff(\'hard\',this)">Hard</button>';
  html += '</div></div>';

  html += '<div class="form-group"><label>Number of Questions</label>';
  html += '<div class="quiz-count-btns">';
  html += '<button class="quiz-count-btn active" onclick="setQuizCount(10, this)">Quick 10</button>';
  html += '<button class="quiz-count-btn" onclick="setQuizCount(25, this)">Short 25</button>';
  html += '<button class="quiz-count-btn" onclick="setQuizCount(50, this)">Medium 50</button>';
  html += '<button class="quiz-count-btn" onclick="setQuizCount(100, this)">Long 100</button>';
  html += '</div>';
  html += '<input type="number" id="quiz-count" placeholder="Or enter custom number..." value="10" min="1" max="999">';
  html += '</div>';

  html += '<button class="btn btn-success" style="width:100%;padding:14px;font-size:16px;margin-top:8px" onclick="startQuiz()">Start Quiz</button>';

function setQuizCount(n, btn) {
  document.getElementById('quiz-count').value = n;
  var btns = btn.parentElement.querySelectorAll('.quiz-count-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  if (btn) btn.classList.add('active');
}

function setQuizDiff(diff, btn) {
  App.quizDifficulty = diff;
  var btns = btn.parentElement.querySelectorAll('.quiz-count-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
}

function saveQuizState_() {
  if (!App.quizActive || !App.quizQuestions) return;
  localStorage.setItem('mcc_quiz_state', JSON.stringify({
    questions: App.quizQuestions,
    answers: App.quizAnswers,
    index: App.quizCurrentIndex,
    specialty: App.quizSetupSpecialty,
    version: App.quizSetupVersion,
    timestamp: Date.now()
  }));
}

function restoreQuizState_() {
  try {
    var saved = JSON.parse(localStorage.getItem('mcc_quiz_state'));
    if (saved && saved.questions && saved.questions.length > 0 && (Date.now() - saved.timestamp) < 3600000) {
      return saved; // valid if less than 1 hour old
    }
  } catch(e) {}
  localStorage.removeItem('mcc_quiz_state');
  return null;
}

function clearQuizState_() {
  localStorage.removeItem('mcc_quiz_state');
}

function startQuiz() {
  var specialty = document.getElementById('quiz-specialty').value;
  var version = document.getElementById('quiz-version').value;
  var count = parseInt(document.getElementById('quiz-count').value) || 10;
  App.quizSetupSpecialty = specialty; App.quizSetupVersion = version;
  var el = document.getElementById('quiz-content');
  el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';

  serverCall('getMCQQuiz', specialty, version, count).then(function(data) {
    App.quizQuestions = data; App.quizAnswers = {}; App.quizCurrentIndex = 0; App.quizActive = true;
    if (data.length === 0) { el.innerHTML = '<div class="card" style="text-align:center;padding:40px"><h3>No questions found</h3><button class="btn btn-primary" onclick="showQuizSetup()">Back</button></div>'; return; }
    saveQuizState_();
    renderQuizQuestion();
  }).catch(function(e) { el.innerHTML = '<div class="card"><p>Error: ' + escapeHtml(e.message || String(e)) + '</p></div>'; });
}

function renderQuizQuestion() {
  var el = document.getElementById('quiz-content');
  var q = App.quizQuestions[App.quizCurrentIndex];
  var total = App.quizQuestions.length; var current = App.quizCurrentIndex + 1;
  var selected = App.quizAnswers[App.quizCurrentIndex] || '';

  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html += '<span style="font-weight:700">Question ' + current + ' of ' + total + '</span>';
  html += '<span style="color:var(--text-light);font-size:13px">' + escapeHtml(q.specialty) + '</span></div>';
  html += '<div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:' + ((current / total) * 100) + '%"></div></div>';

  html += '<div class="card"><p style="font-size:15px;line-height:1.7;margin-bottom:20px">' + escapeHtml(q.question) + '</p>';
  var opts = ['A', 'B', 'C', 'D', 'E'];
  for (var i = 0; i < opts.length; i++) {
    var opt = opts[i]; if (!q.options[opt]) continue;
    html += '<div class="quiz-option' + (selected === opt ? ' selected' : '') + '" onclick="selectQuizAnswer(\'' + opt + '\')"><strong>' + opt + '.</strong> ' + escapeHtml(q.options[opt]) + '</div>';
  }
  html += '</div>';

  html += '<div class="quiz-q-nav">';
  html += '<button class="btn btn-outline" onclick="prevQuizQuestion()"' + (App.quizCurrentIndex === 0 ? ' disabled' : '') + '>&larr; Previous</button>';
  var answered = Object.keys(App.quizAnswers).length;
  html += '<span style="color:var(--text-light);font-size:13px">' + answered + '/' + total + ' answered</span>';
  html += current === total ? '<button class="btn btn-success" onclick="finishQuiz()" style="padding:10px 24px">Finish Quiz</button>' : '<button class="btn btn-primary" onclick="nextQuizQuestion()">Next &rarr;</button>';
  html += '</div>';
  el.innerHTML = html;
}

function selectQuizAnswer(opt) { App.quizAnswers[App.quizCurrentIndex] = opt; saveQuizState_(); renderQuizQuestion(); }
function prevQuizQuestion() { if (App.quizCurrentIndex > 0) { App.quizCurrentIndex--; renderQuizQuestion(); } }
function nextQuizQuestion() { if (App.quizCurrentIndex < App.quizQuestions.length - 1) { App.quizCurrentIndex++; renderQuizQuestion(); } }

function finishQuiz() {
  var correct = 0; var details = [];
  for (var i = 0; i < App.quizQuestions.length; i++) {
    var q = App.quizQuestions[i]; var userAnswer = App.quizAnswers[i] || ''; var isCorrect = userAnswer === q.correct;
    if (isCorrect) correct++;
    details.push({ question: q.question, userAnswer: userAnswer, correctAnswer: q.correct, isCorrect: isCorrect, rationale: q.rationale, options: q.options, specialty: q.specialty });
  }
  var total = App.quizQuestions.length; var percentage = Math.round((correct / total) * 100);
  App.quizActive = false; App.quizResultDetails = details; clearQuizState_();

  var points = correct * POINTS.QUIZ_CORRECT;
  if (correct === total) points += POINTS.QUIZ_PERFECT_BONUS;

  // Save wrong answers for review later
  var wrongOnly = details.filter(function(d) { return !d.isCorrect; }).map(function(d) {
    return { q: d.question, yours: d.userAnswer, correct: d.correctAnswer, rationale: d.rationale || '', specialty: d.specialty || '' };
  });
  serverCall('saveQuizResult', { specialty: App.quizSetupSpecialty, version: App.quizSetupVersion, score: correct, total: total, percentage: percentage, points: points, wrongAnswers: wrongOnly })
    .catch(function(e) { console.error('Failed to save:', e); });

  // Fire-and-forget: get AI study recommendation
  serverCall('analyzeQuizResults', details).then(function(result) {
    if (result && result.recommendation) {
      var recEl = document.getElementById('quiz-ai-rec');
      if (recEl) {
        recEl.innerHTML = '<div style="display:flex;gap:12px;align-items:flex-start"><span style="font-size:24px;flex-shrink:0">&#x1F4A1;</span><div><strong style="font-size:13px;color:var(--primary)">Study Tip</strong><p style="margin:4px 0 0;font-size:14px;line-height:1.6;color:var(--text)">' + escapeHtml(result.recommendation) + '</p></div></div>';
      }
    }
  }).catch(function(){});

  showQuizResults(correct, total, percentage, points);
}

function showQuizResults(score, total, percentage, points) {
  var el = document.getElementById('quiz-content');
  var color = percentage >= 80 ? 'var(--success)' : percentage >= 60 ? 'var(--warning)' : 'var(--error)';
  var passText = percentage >= 73 ? 'PASS' : 'Below Pass Threshold';
  var passColor = percentage >= 73 ? 'var(--success)' : 'var(--error)';

  var html = '<div class="card" style="text-align:center;padding:40px">';
  html += '<h2>Quiz Complete!</h2>';
  html += '<div class="score-big" style="color:' + color + '">' + percentage + '%</div>';
  html += '<p style="font-size:18px;color:var(--text-light)">' + score + ' correct out of ' + total + '</p>';
  html += '<p style="margin-top:4px;font-weight:700;color:' + passColor + '">' + passText + ' (pass: 73%)</p>';
  html += '<p style="color:var(--accent);font-weight:700;margin-top:8px">+' + points + ' XP</p>';
  html += '</div>';

  html += '<div id="quiz-ai-rec" class="card" style="padding:20px;margin-top:16px;background:var(--bg);border-left:4px solid var(--primary)"><span style="color:var(--text-light);font-size:13px">Analyzing your results...</span></div>';

  html += '<div class="result-tabs">';
  html += '<button class="result-tab active" onclick="event.stopPropagation();showResultsView(\'score\', this)">By Specialty</button>';
  html += '<button class="result-tab" onclick="event.stopPropagation();showResultsView(\'wrong\', this)">Wrong Answers (' + App.quizResultDetails.filter(function(d){return !d.isCorrect}).length + ')</button>';
  html += '<button class="result-tab" onclick="event.stopPropagation();showResultsView(\'all\', this)">All Questions</button>';
  html += '</div><div id="results-detail"></div>';

  html += '<div style="display:flex;gap:12px;margin-top:24px">';
  html += '<button class="btn btn-primary" onclick="showQuizSetup()">New Quiz</button>';
  html += '<button class="btn btn-accent" onclick="navigateTo(\'dashboard\')">Dashboard</button>';
  html += '</div>';
  el.innerHTML = html;
  showResultsView('score');
}

function showResultsView(view, btn) {
  var el = document.getElementById('results-detail'); var details = App.quizResultDetails;
  if (btn) { var tabs = document.querySelectorAll('.result-tab'); for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active'); btn.classList.add('active'); }

  if (view === 'score') {
    var specScores = {};
    details.forEach(function(d) { if (!specScores[d.specialty]) specScores[d.specialty] = { correct: 0, total: 0 }; specScores[d.specialty].total++; if (d.isCorrect) specScores[d.specialty].correct++; });
    var html = '<div class="card">';
    Object.keys(specScores).forEach(function(spec) {
      var s = specScores[spec]; var pct = Math.round((s.correct / s.total) * 100); var color = pct >= 80 ? 'var(--success)' : pct >= 60 ? 'var(--warning)' : 'var(--error)';
      html += '<div class="weak-area-row"><span>' + escapeHtml(spec) + '</span><div class="weak-area-score"><div class="progress-bar" style="width:80px"><div class="progress-fill" style="width:' + pct + '%"></div></div><span style="font-weight:700;color:' + color + '">' + s.correct + '/' + s.total + '</span></div></div>';
    });
    html += '</div>'; el.innerHTML = html;
  } else {
    var items = view === 'wrong' ? details.filter(function(d) { return !d.isCorrect; }) : details;
    if (items.length === 0 && view === 'wrong') { el.innerHTML = '<div class="card" style="text-align:center;padding:30px">Perfect score!</div>'; return; }
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var d = items[i];
      html += '<div class="result-item ' + (d.isCorrect ? 'correct' : 'incorrect') + '">';
      html += '<p style="font-weight:600;margin-bottom:6px;font-size:14px">Q' + (details.indexOf(d) + 1) + ': ' + escapeHtml(truncate(d.question, 250)) + '</p>';
      html += '<p style="font-size:13px">Your answer: <strong style="color:' + (d.isCorrect ? 'var(--success)' : 'var(--error)') + '">' + (d.userAnswer || 'None') + '</strong>';
      if (!d.isCorrect) html += ' | Correct: <strong style="color:var(--success)">' + d.correctAnswer + '</strong>';
      html += '</p>';
      if (d.rationale) html += '<p style="margin-top:8px;color:var(--text-light);font-size:13px;line-height:1.5">' + escapeHtml(d.rationale) + '</p>';
      html += '</div>';
    }
    el.innerHTML = html;
  }
}

function showQuizTab(tab) {
  var newBtn = document.getElementById('quiz-tab-new');
  var histBtn = document.getElementById('quiz-tab-history');
  var quizEl = document.getElementById('quiz-content');
  var histEl = document.getElementById('quiz-history-content');

  if (tab === 'history') {
    newBtn.classList.remove('btn-primary'); histBtn.classList.add('btn-primary');
    quizEl.style.display = 'none'; histEl.style.display = 'block';
    loadQuizHistory();
  } else {
    histBtn.classList.remove('btn-primary'); newBtn.classList.add('btn-primary');
    quizEl.style.display = 'block'; histEl.style.display = 'none';
  }
}

function loadQuizHistory() {
  var el = document.getElementById('quiz-history-content');
  el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
  serverCall('getUserQuizHistory').then(function(results) {
    if (!results || results.length === 0) {
      el.innerHTML = '<p class="empty-state">No quiz history yet. Take a practice quiz to see your results here!</p>';
      return;
    }
    var html = '<div style="margin-bottom:16px;color:var(--text-light)">' + results.length + ' quizzes taken</div>';
    for (var i = 0; i < results.length; i++) {
      var r = results[i];
      var color = r.percentage >= 80 ? 'var(--success)' : r.percentage >= 60 ? 'var(--warning)' : 'var(--error)';
      var dateStr = r.date ? new Date(r.date).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }) : 'Unknown';
      var hasWrong = r.wrongAnswers && r.wrongAnswers.length > 0;
      var wrongCount = hasWrong ? r.wrongAnswers.length : (r.total - r.score);

      html += '<div class="card" style="padding:0;margin-bottom:10px;overflow:hidden">';
      html += '<div onclick="' + (hasWrong ? 'this.parentElement.classList.toggle(\'qh-open\')' : '') + '" style="padding:16px;display:flex;justify-content:space-between;align-items:center;cursor:' + (hasWrong ? 'pointer' : 'default') + '">';
      html += '<div><strong>' + escapeHtml(r.specialty || 'Mixed') + '</strong>';
      if (r.version) html += ' <span style="color:var(--text-light);font-size:12px">' + escapeHtml(r.version) + '</span>';
      html += '<br><span style="font-size:12px;color:var(--text-light)">' + dateStr + '</span>';
      if (wrongCount > 0) html += ' <span style="font-size:12px;color:var(--error)">&bull; ' + wrongCount + ' wrong</span>';
      html += '</div>';
      html += '<div style="text-align:right;display:flex;align-items:center;gap:12px">';
      html += '<div><span style="font-size:22px;font-weight:800;color:' + color + '">' + r.percentage + '%</span>';
      html += '<br><span style="font-size:12px;color:var(--text-light)">' + r.score + '/' + r.total + '</span></div>';
      if (hasWrong) html += '<span style="font-size:12px;color:var(--text-light)">&#x25BC;</span>';
      html += '</div></div>';

      // Expandable wrong answers section
      if (hasWrong) {
        html += '<div class="qh-wrong-detail" style="display:none;border-top:1px solid var(--border);padding:16px;background:var(--bg)">';
        html += '<h4 style="margin:0 0 12px;font-size:14px;color:var(--error)">Wrong Answers</h4>';
        for (var wi = 0; wi < r.wrongAnswers.length; wi++) {
          var w = r.wrongAnswers[wi];
          html += '<div style="padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6">';
          html += '<p style="font-weight:600;margin:0 0 4px">' + escapeHtml(w.q || '') + '</p>';
          html += '<p style="margin:0;color:var(--error)">Your answer: <strong>' + escapeHtml(w.yours || '?') + '</strong></p>';
          html += '<p style="margin:0;color:var(--success)">Correct: <strong>' + escapeHtml(w.correct || '?') + '</strong></p>';
          if (w.rationale) html += '<p style="margin:6px 0 0;color:var(--text-light);font-style:italic">' + escapeHtml(w.rationale) + '</p>';
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div>';
    }
    el.innerHTML = html;

    // Add CSS for toggle

function loadDontMiss(specialty) {

}

function renderDontMiss(filterText) {
  var el = document.getElementById('dontmiss-content'); var items = App.dontMissItems;
  if (items.length === 0) { el.innerHTML = '<p class="empty-state">No key topics found for this selection.</p>'; return; }

  var isCondensed = items[0] && items[0].condensed;

  // Apply search filter
  var filtered = items;
  if (filterText && filterText.length >= 2) {
    var q = filterText.toLowerCase();
    filtered = items.filter(function(item) {
      return item.item.toLowerCase().indexOf(q) !== -1 || item.specialty.toLowerCase().indexOf(q) !== -1 ||
        (item.title && item.title.toLowerCase().indexOf(q) !== -1) ||
        (item.points && item.points.toLowerCase().indexOf(q) !== -1);
    });
  }

  // Priority filter
  if (App.ktPriorityFilter && App.ktPriorityFilter !== 'all' && isCondensed) {
    filtered = filtered.filter(function(item) { return item.priority === App.ktPriorityFilter; });
  }

  var groups = {}; var order = [];
  filtered.forEach(function(item) { if (!groups[item.specialty]) { groups[item.specialty] = []; order.push(item.specialty); } groups[item.specialty].push(item); });

  // Priority filter tabs
  var html = '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">';
  html += '<span style="color:var(--text-light);font-size:14px">' + filtered.length + (isCondensed ? ' concept cards' : ' topics') + '</span>';
  if (isCondensed) {
    var pf = App.ktPriorityFilter || 'all';
    html += '<button class="btn btn-sm' + (pf === 'all' ? ' btn-primary' : '') + '" onclick="setKTPriority(\'all\')">All</button>';
    html += '<button class="btn btn-sm' + (pf === 'Must Know' ? ' btn-error' : '') + '" onclick="setKTPriority(\'Must Know\')" style="' + (pf !== 'Must Know' ? 'border-color:#f44336;color:#f44336' : '') + '">Must Know</button>';
    html += '<button class="btn btn-sm' + (pf === 'Should Know' ? ' btn-warning' : '') + '" onclick="setKTPriority(\'Should Know\')" style="' + (pf !== 'Should Know' ? 'border-color:#ff9800;color:#ff9800' : '') + '">Should Know</button>';
    html += '<button class="btn btn-sm' + (pf === 'Good to Know' ? ' btn-success' : '') + '" onclick="setKTPriority(\'Good to Know\')" style="' + (pf !== 'Good to Know' ? 'border-color:#4caf50;color:#4caf50' : '') + '">Good to Know</button>';
  }
  html += '</div>';

  for (var i = 0; i < order.length; i++) {
    var spec = order[i]; var specItems = groups[spec];
    html += '<div class="kt-section card" style="margin-bottom:12px;padding:0;overflow:hidden">';
    html += '<div class="kt-section-header" onclick="this.parentElement.classList.toggle(\'kt-collapsed\')" style="padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none">';
    html += '<h4 style="margin:0;font-size:15px;font-weight:700">' + escapeHtml(spec) + '</h4>';
    html += '<span style="display:flex;align-items:center;gap:8px"><span class="kt-count" style="background:var(--primary);color:white;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700">' + specItems.length + '</span><span class="kt-arrow" style="font-size:12px;color:var(--text-light);transition:transform 0.2s">&#x25BC;</span></span>';
    html += '</div>';
    html += '<div class="kt-section-body" style="padding:4px 20px 16px;border-top:1px solid var(--border)">';

    if (isCondensed) {
      for (var j = 0; j < specItems.length; j++) {
        var card = specItems[j];
        var prColor = card.priority === 'Must Know' ? 'var(--error)' : card.priority === 'Should Know' ? 'var(--warning)' : 'var(--success)';
        html += '<div class="kt-card" style="padding:14px 0;border-bottom:1px solid var(--border)">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
        html += '<strong style="font-size:15px">' + escapeHtml(card.title) + '</strong>';
        html += '<span style="font-size:11px;font-weight:700;color:' + prColor + ';white-space:nowrap;padding:2px 8px;border-radius:6px;border:1px solid ' + prColor + '">' + escapeHtml(card.priority) + '</span>';
        html += '</div>';
        var sections = (card.points || '').split('|').map(function(s) { return s.trim(); }).filter(Boolean);
        html += '<div style="font-size:13px;line-height:1.7;color:var(--text)">';
        for (var k = 0; k < sections.length; k++) {
          html += '<div style="margin:2px 0">' + escapeHtml(sections[k]) + '</div>';
        }
        html += '</div></div>';
      }
    } else {
      for (var j = 0; j < specItems.length; j++) {
        html += '<div class="kt-item" style="padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;line-height:1.6;color:var(--text)">' + escapeHtml(specItems[j].item) + '</div>';
      }
    }
    html += '</div></div>';
  }
  el.innerHTML = html;

  // Collapse sections by default if showing all specialties
  if (!filterText && !App.ktPriorityFilter && order.length > 3) {
    document.querySelectorAll('.kt-section').forEach(function(s) { s.classList.add('kt-collapsed'); });
  }
}

function setKTPriority(priority) {
